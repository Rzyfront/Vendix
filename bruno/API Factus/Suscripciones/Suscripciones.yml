docs: |-
  **Obtener Suscripciones de Usuario**

  Este endpoint permite consultar todas las suscripciones activas de un usuario autenticado. Devuelve información detallada sobre cada suscripción incluyendo:

  - **Información del grupo de documentos:** Nombre y tipos de documentos soportados
      
  - **Cuota de documentos:** Total asignado, consumidos y disponibles
      
  - **Estado de la suscripción:** Fechas de activación y expiración, días restantes
      
  - **Configuración:** Si está activa y si tiene cuota ilimitada
      

  | Campo | Descripción |
  | --- | --- |
  | `name` | Nombre del grupo de documentos asociado a la suscripción |
  | `supported_document_types` | Es un array/lista de tipos de documentos soportados por esta suscripción |
  | `documents_quota` | Cuota total de documentos disponibles en la suscripción |
  | `documents_consumed` | Número de documentos ya utilizados/consumidos |
  | `documents_available` | Cantidad de documentos restantes disponibles |
  | `days_until_expiration` | Días restantes hasta que expire la suscripción |
  | `activated_at` | Fecha y hora de activación de la suscripción (UTC) |
  | `expires_at` | Fecha y hora de expiración de la suscripción (UTC) |
  | `has_expired` | Indica si la suscripción ha expirado (true) o no (false) |
  | `is_active` | Indica si la suscripción está activa (true) o inactiva (false) |
  | `has_unlimited_quota` | Indica si la suscripción tiene cuota ilimitada (true) o limitada (false) |
