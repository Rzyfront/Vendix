docs: |-
  **Nota:** Este endpoint será removido pronto. Usa el endpoint /v1**/subscriptions** en su lugar.

  Este endpoint permite obtener información detallada sobre la suscripción actual del usuario en la API de Factus. Es útil para conocer el estado de la suscripción, la cantidad de documentos disponibles y la fecha de vencimiento.

  #### **Response**

  | Valor | Descripción |
  | --- | --- |
  | `total_documents` | Cantidad total de documentos adquiridos en la suscripción. |
  | `documents_used` | Número de documentos que ya han sido utilizados. |
  | `documents_remaining` | Cantidad de documentos aún disponibles para su uso. |
  | `subscription_start_date` | Fecha de inicio de la suscripción (YYYY-MM-DDTHH:MM:SSZ). |
  | `subscription_expiration_date` | Fecha de vencimiento de la suscripción (YYYY-MM-DDTHH:MM:SSZ). |
  | `subscription_is_expired` | Indica si la suscripción ha expirado (true o false). |
