examples:
  - name: 200-Suscripción actual
    request:
      url: "{{url_api}}/v1/subscriptions/current"
      method: GET
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "status": "OK",
              "message": "Solicitud exitosa",
              "data": {
                  "total_documents": 3000,
                  "documents_used": 0,
                  "documents_remaining": 3000,
                  "subscription_days_to_expires": 349,
                  "subscription_start_date": "2025-03-01T00:00:00Z",
