docs: |-
  **Descripción:** Crea rangos de numeración para los documentos electrónicos.

  | ID | Value |
  | --- | --- |
  | `document` | Código de documento, use uno de estos codigos seleccionar el documento:  <br>21=Factura de Venta  <br>22=Nota Crédito  <br>23=Nota Débito  <br>24=Documento Soporte  <br>25=Nota de Ajuste Documento Soporte  <br>26=Nómina  <br>27=Nota de Ajuste Nómina  <br>28=Nota de eliminación de nómina  <br>30=Factura de talonario o de papel |
  | `prefix` | Prefijo del rango de numeración |
  | `current` | Número actual del consecutivo.  <br>Este numero es el numero de del siguiente documento. |
  | `resolution_number` | Número de resolución del rango.  <br>Solo es opcional si el campo `document` contiene el codigo 21 o 24. |

  **RESPONSE**

  #### **Response**

  | Valor | Descripción |
  | --- | --- |
  | `id` | id del rango de numeracion |
  | `document` | Código del documento |
  | `document_name` | Nombre del documento |
  | `prefix` | Prefijo del rango de numeración |
  | `from` | Número de incio del rango de numeración |
  | `to` | Número del final del rango de numeración |
  | `current` | Siguiente número del rango de numeración |
  | `resolution_number` | Numero de resolución |
  | `start_date` | Fecha en la que se expidio el rango de numeración |
  | `end_date` | Fecha de vencimiento del rango de numeración |
  | `technical_key` | Clave tecnica |
  | `is_expired` | El valor es 1 cuando el rango de numeracion esta vencido y 0 cuando esta vigente |
  | `is_active` | El valor es 1 cuando el rango de numeración esta activo y 0 cuando no esta activo |
  | `craated_at` | Fecha de creación |
  | `updated_at` | Fecha de actualización |
