info:
  name: Actualizar consecutivo
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{url_api}}/v1/numbering-ranges/:numbering_range_id/current"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: numbering_range_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
          "current": 985000001
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - Actualizar rango
    request:
      url: "{{url_api}}/v1/numbering-ranges"
      method: POST
      headers:
        - name: Accept
          value: application/json
      body:
        type: json
        data: |-
          {
              "document": 21,
              "prefix": "FV",
              "from": 1,
              "to": 1000,
              "current": 1,
              "resolution_number": "d3kd93kd39jd92",
              "start_date": "2024-10-01",
              "end_date": "2024-04-01",
              "technical_key": "dfs3dfs334d8d8s96s8d"
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "status": "OK",
              "message": "Rango de numeración actualizado con éxito",
              "data": {
                  "id": 59,
                  "document": "21",
                  "document_name": "Factura de Venta",
                  "prefix": "FV",
                  "from": 1,
                  "to": 1000,
                  "current": 1,
                  "resolution_number": "d3kd93kd39jd92",
                  "start_date": "01-10-2024",
                  "end_date": "01-04-2025",
                  "technical_key": "dfs3dfs334d8d8s96s8d",
                  "is_expired": true,
                  "is_active": 1,
                  "created_at": "2024-09-10T15:56:22Z",
                  "updated_at": "2024-09-10T17:35:56Z"
              }
          }

docs: |-
  **Descripción:** Actualiza la información para los rangos de numeración para los documentos electrónicos.

  | ID | Value |
  | --- | --- |
  | `current` | Número actual del consecutivo.  <br>  <br>**NOTA**  <br>Si el consecutivo es nuevo debe agregar el mismo numero del campo `from.Si` el consecutivo se ha usado, debe agregar el numero del último consecutivo usado. |

  **RESPONSE**

  #### **Response**

  | Valor | Descripción |
  | --- | --- |
  | `id` | id del rango de numeracion |
  | `document` | Código del documento |
  | `document_name` | Nombre del documento |
  | `prefix` | Prefijo del rango de numeración |
  | `from` | Número de incio del rango de numeración |
  | `to` | Número del final del rango de numeración |
  | `current` | Siguiente número del rango de numeración |
  | `resolution_number` | Numero de resolución |
  | `start_date` | Fecha en la que se expidio el rango de numeración |
  | `end_date` | Fecha de vencimiento del rango de numeración |
  | `technical_key` | Clave tecnica |
  | `is_expired` | El valor es 1 cuando el rango de numeracion esta vencido y 0 cuando esta vigente |
  | `is_active` | El valor es 1 cuando el rango de numeración esta activo y 0 cuando no esta activo |
  | `craated_at` | Fecha de creación |
  | `updated_at` | Fecha de actualización |
