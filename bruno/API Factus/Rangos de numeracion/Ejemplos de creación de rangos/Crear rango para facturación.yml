info:
  name: Crear rango para facturación
  type: http
  seq: 1

http:
  method: POST
  url: "{{url_api}}/v1/numbering-ranges"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "document": "21", // 21 para crear un rango de facturación electrónica
          "prefix": "SETP", // Prefijo alfanumérico del rango de numeración (máx. 4 caracteres)
          "resolution_number": "18760000009", // número de resolución
          "current": 984000000 // número del consecutivo (es el numero de la siguiente factura) 
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
