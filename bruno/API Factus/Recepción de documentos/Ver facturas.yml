docs: |-
  Obtiene y filtra las facturas electrónicas.

  | **ID** | **Descripción** |
  | --- | --- |
  | `ID` | ID del registro. |
  | `number` | Número de la factura. |
  | `issue_date` | Fecha en la que se emitió de la factura. |
  | `Issute_time` | Hora en la que se emitió la factura. |
  | `cufe` | CUFE de la factura. |
  | `company_nit` | NIT de la persona o empresa (emisor/facturador). |
  | `company_name` | Nombre o razíón social de la persona o empresa (emisor/facturador). |
  | `payment_form[code]` | Código de la forma de pago. |
  | `payment_form[name]` | Nombre de la forma de pago. |
  | `claim_concept` | Array que contiene la informacion del motivo del reclamo, en el caso de que se haya generado el evento de raclamo en la factura. |
  | claim_concept\[code\] | Código del mótivo del reclamo. |
  | claim_concept\[name\] | Nombre del mótivo del reclamo. |
  | `payment_due_date` | Fecha de vencimiento del la factura. |
  | `is_negotiable_instrument` | Booleano que me indica si la factura se encutra como título valor o no. |
  | `has_claim` | Booleano que me indica si se ha generado un evento de reclamo a la factura. |
  | `total` | Total de la factura. |
  | `created_at` | Fecha en la que se cargo el documento a la API de Factus. |
