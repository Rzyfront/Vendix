docs: |-
  Este endpoint se utiliza para cargar las facturas electrónicas que hayan sido generadas por una persona o empresa (emisor/facturador).

  | ID | Descripción |
  | --- | --- |
  | **`track_id`** | CUFE de la factura electrónica |

  ---

  ## **Descripción de la response cuando el código de estado es 201**

  | **ID** | **Descripción** |
  | --- | --- |
  | `ID` | ID del registro. |
  | `issue_date` | Fecha en la que se emitió de la factura. |
  | `Issute_time` | Hora en la que se emitió la factura. |
  | `payment_due_date` | Fecha de vencimiento de la factura. |
  | `number` | Número de la factura. |
  | `cufe` | CUFE de la factura. |
  | `company_identification_type_code` | Código de tipo de indentificación de la persona o empresa (emisor/facturador). |
  | `company_nit` | NIT de la persona o empresa (emisor/facturador). |
  | `dv` | Dígito de verificación de la person o empresa (emisor/facturador). |
  | `company_name` | Nombre o razíón social de la persona o empresa (emisor/facturador). |
  | `payment_form[code]` | Código de la forma de pago. |
  | `payment_form[name]` | Nombre de la forma de pago. |
  | `payment_method[code]` | Código de método de pago. |
  | `payment_method[name]` | Nombre del método de pago. |
  | `total` | Total de la factura. |
  | `has_claim` | Booleano que me indica si la factura tiene el evento de reclamo. |
  | `is_negotiable_instrument` | Booleano que me indica si la factura se encuentra como título valor. |
  | `events` | array que contiene los eventos generados a la factura. |
  | `events.\\*.[number]` | Número del evento. |
  | `events.\\*.[cude]` | CUDE del evento. |
  | `events.\\*.[code]` | Código del evento. |
  | `events.\\*.[name]` | Nombre del evento. |
  | `events.\\*.[effective_date]` | Fecha en la que se emitió el evento. |
  | `events.\\*.[affective_time]` | Hora en la que se emitió el evento. |
  | `events.\\*.[peson_identification]` | Número de identificación de la persona del evento. |
  | `events.\\*.[person_names]` | Nombre de la persona del evento. |
  | `created_at` | Fecha en la que se cargo el documento a la API de Factus. |
