info:
  name: Unidades de medida
  type: http
  seq: 1

http:
  method: GET
  url: "{{url_api}}/v1/measurement-units?name="
  headers:
    - name: Accept
      value: application/json
  params:
    - name: name
      value: ""
      type: query
      description: Nombre de la unidad de medida
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  #### **Response**

  | Valor | Descripción |
  | --- | --- |
  | id | id de la unidad de medida |
  | code | codigo de la undidad de medida |
  | name | Nombre de la unidad de medida |
