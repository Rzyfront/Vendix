opencollection: 1.0.0

info:
  name: API Factus

request:
  auth:
    type: bearer
    token: "{{access_token}}"
  scripts:
    - type: before-request
      code: |-
        const urlAPI = bru.getEnvVar("url_api");
        const clientID = bru.getEnvVar("client_id");
        const clientSecret = bru.getEnvVar("client_secret");
        const username = bru.getEnvVar("email");
        const password = bru.getEnvVar("password");
        await bru.sendRequest({
            url: urlAPI + '/oauth/token',
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                "Content-Type": "application/x-www-form-urlencoded"
            },
            data: {
                "grant_type": 'password',
                "client_id": clientID,
                "client_secret": clientSecret,
                "username": username,
                "password": password
            }
        }, async function(err, res) {
            if (err) {
                console.error(err);
            } else {
                bru.setGlobalEnvVar('access_token', res.data.access_token);
            }
        });

docs:
  content: |-
    # API de facturación electrónica para Colombia

    Documentacion oficial de Factus API, en la cual podrá crear, consultar y validar facturas desde su propio cliente.

    _**Pre-requisitos para usar el API:**_

    |  |  |
    | --- | --- |
    | **Tipo:** | REST API |
    | **Credenciales:** | **Se deben solicitar al administrador del sistema.**  <br>  <br>**grandtype:** password (valor por default)  <br>**client_id,  <br>client_secret,  <br>username,  <br>password**  <br>  <br>Las anteriores credenciales se deben usar para la solicitud del token de acceso y el token de refresco usando el endpoint Auth.  <br>[Ver endpoint](https://developers.factus.com.co/autenticacion/auth/) |
    | **Token genereados:** | **access_token:** Token que se deben usar para realizar cada solicitud a los endpoint.  <br>**refresh_token:** Token que se debe enviar para solicitar un nuevo access_token al caducar su uso. |
    | **Tiempo de caducidad de tokens:** | 1 hora, el tiempo de caducidad se genera en milisegundos, en la peticion de [genereacion de token](https://developers.factus.com.co/autenticacion/auth/) y en el endpoint de [refresh token](https://developers.factus.com.co/autenticacion/refresh-token/). |

    # **Tablas**

    ### Códigos de corrección

    | **Código** | **Descripción** |
    | --- | --- |
    | 1 | Devolución parcial de los bienes y/o no aceptación parcial del servicio. |
    | 2 | Anulación de factura electrónica. |
    | 3 | Rebaja o descuento parcial o total. |
    | 4 | Ajuste de precio. |
    | 5 | Descuento comercial por pronto pago. |
    | 6 | Descuento comercial por volumen de ventas. |

    ### Códigos de tipos de operación

    | **Código** | **Descripción** |
