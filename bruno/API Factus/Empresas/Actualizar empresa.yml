docs: |-
  Actualiza la información de la empresa

  La información ingresada en estos campos debe corresponder a la registrada en el RUT

  #### **Descripción del body**

  | **ID** | **Valor** |
  | --- | --- |
  | `legal_organization_code` | Código que corresponda al tipo de organización para saber el código correspondiente consulte la tabla [Código de los tipos de organizaciones.](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tipos-de-organizaciones) |
  | `company` | (Opcional) Este campo es requerido si el campo `legal_organization_code` contiene el valor de 1 (Persona jurídica) |
  | `trade_name` | (Opcional) Nombre comercial. |
  | `names` | (Opcional) Este campo es requerido si el campo `legal_organization_code` contiene el valor de 2 (Persona natural). |
  | `surnames` | (Opcional) Este campo es requerido si el campo `legal_organization_code` contiene el valor de 2 (Persona natural) |
  | `registration_code` | (Opcional) Código de registro mercantil. |
  | `economic_activity` | Número de la actividad economica. |
  | `phone` | Número de teléfono. |
  | `email` | Correo electrónico. |
  | `address` | Dirección |
  | `tribute_code` | Código del tributo. Para saber el código que corresponde al tributo consulte la tabla de [Tributos.](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tributos-clientes) |
  | `municipality_code` | Código del municipio. Para saber el código que corresponde al municipio consulte el endpoint de [Municipios.](https://martian-spaceship-418933.postman.co/workspace/af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-f830b201-2ae5-446d-bc32-6b3e92f218b3) |
  | `responsibilities[]` | Id de los tipos de responsabilidad fiscal. |
