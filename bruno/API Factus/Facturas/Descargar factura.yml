examples:
  - name: 200 - Descargar factura
    request:
      url: "{{url_api}}/v1/bills/download-pdf/:number"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: number
          value: SETP990000282
          type: path
      body:
        type: text
        data: ""
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "status": "OK",
              "message": "Solicitud exitosa",
              "data": {
                  "file_name": "fv09008257590002400000241",
                  "pdf_base_64_encoded": ""
              }
          }

docs: |-
  **Nota:** Es necesario el envio del (access_token) token de acceso para la descarga de la factura.  
  para ver como generar el token. use el siguiente link. [Auth endpoint](https://martian-spaceship-418933.postman.co/workspace/api.factus.com.co~af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-d94026db-94e7-430e-81b1-86cd3e7d9de6?ctx=documentation)

  Recuerde que el token de acceso caduca cada hora.

  El endpoint devuelve una factura codificada en base64 y el nombre del archivo, deberas decodificar el contenido de pdf_base_64_encoded
