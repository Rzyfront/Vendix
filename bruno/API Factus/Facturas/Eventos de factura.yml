info:
  name: Eventos de factura
  type: http
  seq: 9

http:
  method: GET
  url: "{{url_api}}/v1/bills/:number/radian/events"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: number
      value: ""
      type: path
      description: Número de factura.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

