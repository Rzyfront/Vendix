info:
  name: Enviar correo
  type: http
  seq: 9

http:
  method: POST
  url: "{{url_api}}/v1/bills/send-email/:number"
  params:
    - name: number
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
          "email": "alanturing@enigmasas.com.com",
          "pdf_base_64_encoded": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - Enviar correo
    request:
      url: "{{url_api}}/v1/bills/send-email/:number"
      method: POST
      params:
        - name: number
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
              "email": "alanturing@enigmasas.com.com",
              "pdf_base_64_encoded": ""
          }
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "status": "OK",
              "message": "Nota crédito enviada al cliente con éxito"
          }

docs: |-
  Este endpoint envía por correo electrónico la nota crédito en un archivo ZIP que incluye un PDF y un archivo XML (AttachedDocument). El PDF puede ser generado y enviado en formato Base64. En caso de no proporcionarse, se utilizará por defecto la representación gráfica generada por el sistema.

  **NOTA:** Solo se pueden enviar dos correos por documento al día.

  ### Descripción del body

  | ID | Valor |
  | --- | --- |
  | email | Correo electrónico al cual se desea enviar la factura |
  | pdf_base_64_encoded | (Opcional) PDF de la representación gráfica de la nota crédito enviado como cadena codificada en Base64 |
