info:
  name: Notas Crédito
  type: http
  seq: 3

http:
  method: GET
  url: "{{url_api}}/v1/credit-notes"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: filter[identification]
      value: ""
      type: query
      description: Buscar por número de identificación
      disabled: true
    - name: filter[names]
      value: ""
      type: query
      description: Buscar por el nombre del cliente
      disabled: true
    - name: filter[number]
      value: ""
      type: query
      description: Buscar por número de nota crédito
      disabled: true
    - name: filter[prefix]
      value: ""
      type: query
      description: Buscar por prefijo de rango de numeración
      disabled: true
    - name: filter[reference_code]
      value: ""
      type: query
      description: Buscar por código de referencia
      disabled: true
    - name: filter[status]
      value: ""
      type: query
      description: Buscar por estado del documento. 1 = validado, 0 si no esta validado
      disabled: true
    - name: filter[per_page]
      value: "10"
      type: query
      description: Cantidad de registros por pagina. Por defecto tiene el valor de 10
      disabled: true
    - name: filter[created_at][start_date]
      value: 2025-10-01
      type: query
      description: Fecha de inicio (usando para buscar por un rango de fechas)
      disabled: true
    - name: filter[created_at][end_date]
      value: 2025-10-31
      type: query
      description: Fecha de fin (usado para buscar por un rango de fechas)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

