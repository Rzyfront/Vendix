info:
  name: Descargar PDF de Nota Crédito
  type: http
  seq: 6

http:
  method: GET
  url: "{{url_api}}/v1/credit-notes/download-pdf/:number"
  params:
    - name: number
      value: NC72
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
