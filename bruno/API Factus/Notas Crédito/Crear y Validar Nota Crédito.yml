docs: |-
  Permite crear una nota credito y validarla.

  **Nota:** Es necesario el envio del (access_token) token de acceso en la creacion de la factura.  
  para ver como generar el token. use el siguiente link. [Auth endpoint](https://www.postman.com/martian-spaceship-418933/api-factus/folder/1crsnhy/auth?action=share&source=copy-link&creator=22150862&ctx=documentation)

  Recuerde que el token de acceso caduca cada hora.

  Para una mirada más amplia de los datos enviados, revisar el body raw enviado en la peticion de **Crear y Validar Nota Credito**, si tiene dudas con algún campo revise siguientes tablas.

  **Datos para envío en body hacia el endpoint de creación de la nota crédito.**

  **Method:** POST  
  **Content-Type:** application/json

  # Descripción de campos

  | **Campo** | **Descripción** |
  | --- | --- |
  | `numbering_range_id` | ID del rango de numeración. Para saber cual es el ID de cada rango de numeración consulte el siguiente endpoint: [Rangos de numeración ](https://developers.factus.com.co/rangos-de-numeracion/obtener-rangos/) Si tienes en la API solo un rango de numeración activo para la notas crédito, este campo puede ser opcional. Si no envías el rango de numeración la API tomara el único rango de numeración que este activo. Si hay más de un rango de numeración para la facturación, este campo es obligatorio. |
  | `correction_concept_code` | Código de corrección. Código del concepto por el cual se general la nota crédito. Para saber los códigos aceptados revisar la tabla [códigos de corrección](https://developers.factus.com.co/tablas-de-referencia/tablas/#c%C3%B3digos-de-correcci%C3%B3n) |
  | `customization_id` | Código del tipo de operación. Para saber los códigos aceptados revisar la tabla [códigos de tipos de operación](https://developers.factus.com.co/tablas-de-referencia/tablas/#c%C3%B3digos-de-tipos-de-operaci%C3%B3n-notas-cr%C3%A9dito) |
  | `bill_id` | ID de la factura a la que se le generara la nota crédito. Este campo es opcional si el campo customization_id = 22 (Nota credito sin referencia a una factura electrónica). |
  | `reference_code` | El código de referencia es un identificador único y obligatorio que se utiliza para distinguir de manera exclusiva cada registro. |
  | `payment_method_code` | Código del medio de pago. |
  | `send_email` | (Opcional) Booleano que indica si el sistema debe enviar el correo electrónico al cliente. Útil cuando el envío del correo se gestiona de forma externa o personalizada por el integrador. Por defecto, este campo tiene un valor de true, lo que implica que el correo electrónico será enviado al cliente. Si se establece en false, el correo no será enviado. |
  | `observation` | (Opcional) Agrega una observación en caso de requerirlo. |
  | `billing_period{}` | (opcional) Este es un objeto que contendra la información del periodo de facturación. Para utilizar en los servicios públicos, contratos de arrendamiento, matriculas en educación, etc. . Este campo es requerido si el campo customization_id = 22 (Nota credito sin referencia a una factura electrónica). |
  | `billing_period.start_date` | Fecha de inicio del periodo de facturación en formato `YYYY-MM-DD`. |
  | `billing_period.start_time` | (opcional) Hora de inicio del periodo de facturación en formato `HH:mm:ss`. |
  | `billing_period.end_date` | Fecha de fin del periodo de facturación en formato `YYYY-MM-DD`. |
  | `billing_period.start_time` | (opcional) Hora del fin del periodo de facturación en formato `HH:mm:ss`. |
  | `establishment {}` | (Opcional) Objeto que contendrá la información sobre el establecimiento. Úsalo cuando manejes más de un establecimiento y necesites que los datos correspondientes se reflejen en la factura. |
  | `establishment.name` | Nombre del establecimiento. |
  | `establishment.address` | Dirección del establecimiento. |
  | `establishment.phone_number` | Número telefónico del establecimiento. |
  | `establishment.email` | Correo electrónico del establecimiento. |
  | `establishment.municipality_id` | ID que corresponda al Municipio donde se encuentra el establecimiento. Para saber cual ID corresponde al municipio consulte el endpoint [Municipios](https://developers.factus.com.co/municipios/obtener-municipios/) |

  ### **Clientes**

  | **Campo** | **Descripción** |
  | --- | --- |
  | `customer{}` | (Opcional) Este es un objeto que contendra la información del cliente de la nota crédito. Si no se envian los datos del cliente, la API tomara los datos del cliente de la factura relacionada al campo bill_id. |
  | `customer.identification_document_id` | ID que corresponda al tipo de identificacion. Para saber cual ID corresponde al tipo de identificación consulte la siguiente tabla [IDs tipos de documentos](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tipos-de-documentos-de-identidad). |
  | `customer.identification` | Número de identificación del cliente. |
  | `customer.dv` | (opcional) Digíto de verificación del cliente. Requerido si el cliente se identifica con NIT. |
  | customer.company | (opcional) Razon social. Obligatorio si el cliente es persona juridica. |
  | customer.trade_name | (opcional) Nombre comercial |
  | customer.names | (opcional) Nombre del cliente. Solo aplica para los clientes que son personas naturales. |
  | `customer.address` | (opcional) Dirección del cliente. |
  | `customer.email` | (opcional) Dirección del correo electrónico del cliente. |
  | `customer.phone` | (opcional) Número de teléfono del cliente. |
  | `customer.legal_organization_id` | ID que corresponsa al tipo de organizacion. Para saber cual id corresponde al tipo de organizacion consulte la siguiente tabla [IDs tipos de organizaciones](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tipos-de-organizaciones). |
  | `customer.tribute_id` | ID del tributo. Para saber cual id corresponde al tributo consulte la siguiente tabla [IDs tipos de tributos](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tributos-clientes). |
  | `customer.municipality_id` | (opcional) ID que corresponda al municipio donde vive el cliente. Para saber cual ID corresponde al municipio consulte el siguiente endpoint: [Municipios<br>](https://developers.factus.com.co/municipios/obtener-municipios/)**Nota:** Se debe enviar ID del municipio únicamente si el municipio es de Colombia, si es extranjero el campo es opcional. |

  ### **Items**

  El objeto items, corresponde a los productos de la nota credito, se debe enviar un objeto por cada producto.

  | **ID** | **Value** |
  | --- | --- |
  | `note` | (opcional) Añade información adicional del producto o servicio. |
  | `code_reference` | Código de referencia del producto o servicio. |
  | `name` | Nombre del item. |
  | `quantity` | Cantidad del producto. Debe ser un número entero. |
  | `discount_rate` | Porcentaje del descuento. |
  | `price` | Valor del item con impuestos incluidos. |
  | `tax_rate` | Porcentaje del impuesto aplicado al item. |
  | `unit_measure_id` | ID que corresponda a la unidad de medida de item. Para saber que ID corresponde a cada unidad de medida consulte el siguiente endpoint: [Unidades de medida](https://developers.factus.com.co/unidades-de-medida/obtener-unidades/) |
  | `standard_code_id` | ID que corresponde al codigo de estandar de identificacion que se adopto para los productos o servicios. Para saber que IDs son aceptados consulte la tabla _**Códigos de estandar de identificación del productos**_ |
  | `is_excluded` | 1 si el producto o servicio esta excluido del impuesto IVA y 0 cuando no esta excluido de IVA. |
  | `tribute_id` | ID que corresponde al tributo aplicado al item. Para saber que IDs son aceptados consulte la en endpoint [Tributos de productos](https://developers.factus.com.co/tributos/tributos-de-productos/) |
  | `withholding_taxes[]` | (opcional) Array de objetos (autorretenciones) Este campo sirve para informar las retenciones en la fuente que se aplican al producto o servicio.  <br>No son retenciones que otra persona o empresa te hace a ti, sino retenciones que tú mismo te aplicas como contribuyente.  <br>Por cada retención que te apliques a ti mismo, debes enviar un objeto. |
  | `code` | Código de la retención aplicada al item.  <br>Para saber el código de la retención consulte el siguiente endpoint: [Tributos de productos](https://developers.factus.com.co/tributos/tributos-de-productos/) |
  | `withhoding_tax_rate` | Porcentaje de la retención aplicada al item. |
