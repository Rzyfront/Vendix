docs: |-
  **Nota:** Es necesario el envio del (access_token) token de acceso en la creacion de la factura.  
  para ver como generar el token. use el siguiente link. [Auth endpoint](https://martian-spaceship-418933.postman.co/workspace/api.factus.com.co~af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-d94026db-94e7-430e-81b1-86cd3e7d9de6?ctx=documentation)

  Recuerde que el token de acceso caduca cada hora.

  La respuesta del endpoint arroja el total de los documentos soporte generados, por pagina 10 resultados, pagina actual, ultima pagina, desde, hasta y los links de navegación entre el endpoint de facturas, los anteriores campos con el fin de paginar la respuesta.

  Para navegar entre las páginas del endpoint de get Documentos soporte use el query param page y el número de página al que quiere navegar, si el número de página no existe el objeto data será vacio.
