info:
  name: Ver documento soporte
  type: http
  seq: 3

http:
  method: GET
  url: "{{url_api}}/v1/support-documents/show/:number"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: number
      value: SEDS984000088
      type: path
      description: numero de documento soporte
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

