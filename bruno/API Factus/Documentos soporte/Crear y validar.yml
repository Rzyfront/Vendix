docs: |-
  ### Descripción del body

  | ID | **Valor** |
  | --- | --- |
  | `reference_code` | Código único sirve para identificar cada documento soporte de manera unívoca en el sistema y garantizar que no haya duplicados. Esto nos ayuda a prevenir que se genere más de un documento soporte con la misma información. |
  | `numbering_range_id` | ID del rango de numeración. Para conocer el ID de cada rango de numeración, consulta el siguiente endpoint: [Rangos de numeración ](https://developers.factus.com.co/rangos-de-numeracion/obtener-rangos/) Si en la API solo hay un rango de numeración activo para los documentos soporte, este campo es opcional. En caso de no enviarlo, la API utilizará automáticamente el único rango activo.  <br>Si existen múltiples rangos de numeración para los documentos soporte, este campo es obligatorio. |
  | `payment_method_code` | (opcional) Código del método de pago. Si el medio de pago no se agrega, por defecto la API agrega el código 10 (efectivo).  <br>Para saber cual es el código de cada método de pago consulte el siguiente endpoint: [Códigos de métodos de pago.](https://developers.factus.com.co/tablas-de-referencia/tablas/#c%C3%B3digos-de-m%C3%A9todos-de-pago) |
  | `observation` | Agrega una observación. No debe tener más de 250 caracteres. |
  | `provider{}` | Este es un objeto que contendra la información del proveedor del bien o servicio del documento soporte. |
  | `provider.identification_document_id` | ID que corresponda al tipo de identificacion. Para saber cual ID corresponde al tipo de identificación consulte la siguiente tabla [IDs tipos de documentos](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tipos-de-documentos-de-identidad-para-documentos-soporte-y-notas-de-ajuste). |
  | `provider.identification` | Número de identificación del proveedor. |
  | `provider.dv` | (opcional) Digíto de verificación del proveedor. Requerido si el proveedor se identifica con NIT. |
  | `provider.trade_name` | (opcional) Nombre comercial |
  | `provider.names` | Nombre del proveedor. |
  | `provider.address` | Dirección del proveedor. |
  | `provider.email` | Dirección del correo electrónico del proveedor. |
  | `provider.phone` | (opcional) Número de teléfono del proveedor. |
  | `provider.country_code` | Código del país donde reside el proveedor. Para saber cual código corresponde a cada país consulte el siguiente endpoint: [Países](https://developers.factus.com.co/paises/obtener-paises/) |
  | `provider.municipality_id` | (opcional) ID que corresponda al municipio donde reside el proveedor. Para saber cual ID corresponde al municipio consulte el siguiente endpoint: [Municipios<br>](https://developers.factus.com.co/municipios/obtener-municipios/)**Nota:** Se debe enviar ID del municipio únicamente si el campo `provider.country_code` es igual a `CO`, de lo contrario este campo es opocional. |
  | `items{}` | (El array de items, corresponde a los productos o servicios de documento soporte, se debe enviar un objeto por cada producto o servicio). |
  | `item.`\*`.code_reference` | Código de referencia del producto o servicio. |
  | `item.`\*`.name` | Nombre del producto o servicio. |
  | `item.`\*`.quantity` | Candidad del producto o servicio. Debe ser un número entero. |
  | `item.`\*`.discount_rate` | Porcentaje del descuento del producto o servicio. |
  | `item.`\*`.price` | Precio del producto o servicio. |
  | `item.`\*`.unit_measure_id` | ID que corresponda a la unidad de medida de item. Para saber que ID corresponde a cada unidad de medida consulte el siguiente endpoint: [Unidades de medida](https://developers.factus.com.co/unidades-de-medida/obtener-unidades/) |
  | `item.`\*`.standard_code_id` | ID que corresponde al codigo de estandar que se adopto para los productos o servicios. Para saber que ID corresponde al código de estandar consulte la siguiente tabla: [IDs de códigos de estándar](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-est%C3%A1ndar-de-identificaci%C3%B3n-del-producto). |
  | `items.`\*`withholding_taxes[]` | (opcional) Array de objetos (autorretenciones) Este campo sirve para informar las retenciones en la fuente que se aplican al producto o servicio.  <br>No son retenciones que otra persona o empresa te hace a ti, sino retenciones que tú mismo te aplicas como contribuyente.  <br>Por cada retención que te apliques a ti mismo, debes enviar un objeto. |
  | `items.`\*`.withholding_taxes.`\*`.code` | Código de la retención aplicada al producto o servicio.  <br>Para saber el código de la retención consulte el siguiente endpoint: [Tributos de productos](https://developers.factus.com.co/tributos/tributos-de-productos/) |
  | `items.`\*`.withholding_taxes.`\*`.withhoding_tax_rate` | Porcentaje de la retención aplicada al item. |
