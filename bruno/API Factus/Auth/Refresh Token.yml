info:
  name: Refresh Token
  type: http
  seq: 2

http:
  method: POST
  url: "{{url_api}}/oauth/token"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: grant_type
        type: text
        value: refresh_token
      - name: client_id
        type: text
        value: "{{client_id}}"
      - name: client_secret
        type: text
        value: "{{client_secret}}"
      - name: refresh_token
        type: text
        value: 
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - Actualizar token
    request:
      url: "{{url_api}}/oauth/token"
      method: POST
      headers:
        - name: Accept
          value: application/json
      body:
        type: multipart-form
        data:
          - name: grant_type
            type: text
            value: refresh_token
          - name: client_id
            type: text
            value: "{{client_id}}"
          - name: client_secret
            type: text
            value: "{{client_secret}}"
          - name: refresh_token
            type: text
            value: 
    response:
      statusText: "200"
      headers:
        - name: Date
          value: Wed, 03 Apr 2024 20:58:37 GMT
        - name: Server
          value: Apache/2.4.41 (Ubuntu)
        - name: pragma
          value: no-cache
        - name: Cache-Control
          value: no-store, private
        - name: X-RateLimit-Limit
          value: "60"
        - name: X-RateLimit-Remaining
          value: "59"
        - name: Keep-Alive
          value: timeout=5, max=100
        - name: Connection
          value: Keep-Alive
        - name: Transfer-Encoding
          value: chunked
        - name: Content-Type
          value: application/json; charset=UTF-8
      body:
        type: json
        data: |-
          {
              "token_type": "Bearer",
              "expires_in": 3600,
              "access_token": "tu access token",
              "refresh_token": "tu refresh token"
          }

docs: Actualizar el token de acceso.
