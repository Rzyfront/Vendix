docs: |-
  ### Descripción del body

  | ID | **Valor** |
  | --- | --- |
  | `reference_code` | Código único sirve para identificar cada nota de ajuste de manera unívoca en el sistema y garantizar que no haya duplicados. Esto nos ayuda a prevenir que se genere más de una nota de ajuste con la misma información. |
  | `numbering_range_id` | ID del rango de numeración. Para saber cual es el ID de cada rango de numeración consulte el siguiente endpoint: [Rangos de numeración ](https://martian-spaceship-418933.postman.co/workspace/af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-40261e61-a771-4673-84fc-affe4d29ba5f?ctx=documentation) Si tienes en la API solo un rango de numeración activo para las notas de ajuste, este campo puede ser opcional. Si no envías el rango de numeración la API tomara el único rango de numeración que este activo. Si hay más de un rango de numeración para las notas de ajuste, este campo es obligatorio. |
  | `payment_method_code` | (opcional) Código del método de pago. Si el medio de pago no se agrega, por defecto la API agrega el código 10 (efectivo).  <br>Para saber cual es el código de cada método de pago consulte el siguiente endpoint: [Códigos de métodos de pago.](https://developers.factus.com.co/tablas-de-referencia/tablas/#c%C3%B3digos-de-m%C3%A9todos-de-pago) |
  | `support_document_id` | ID del documento soporte al que se le hará la nota de ajuste. |
  | `correction_concept_code` | Código del motivo por el cual se genera la nota de ajuste. Para conocer el código de cada motivo, consulte el siguiente endpoint: [Motivos para la generación de las notas de ajuste](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tipos-de-documentos-de-identidad-para-documentos-soporte-y-notas-de-ajuste) |
  | `observation` | Agrega una observacion a la nota de ajuste. No debe tener mas de 250 caracteres. |
  | `items{}` | (El array de items, corresponde a los productos de la nota de ajuste, se debe enviar un objeto por cada producto o servicio). |
  | `item.`\*`.code_reference` | Código de referencia del producto o servicio. |
  | `item.`\*`.name` | Nombre del producto o servicio. |
  | `item.`\*`.quantity` | Candidad del producto o servicio. Debe ser un número entero. |
  | `item.`\*`.discount_rate` | Porcentaje del descuento del producto o servicio. |
  | `item.`\*`.price` | Precio del producto o servicio. |
  | `item.`\*`.unit_measure_id` | ID que corresponda a la unidad de medida de item. Para saber que ID corresponde a cada unidad de medida consulte el siguiente endpoint: [Unidades de medida](https://martian-spaceship-418933.postman.co/workspace/af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-e963fe33-fc46-44ac-9323-3ad3f79ec912?ctx=documentation) |
  | `item.`\*`.standard_code_id` | ID que corresponde al codigo de estandar que se adopto para los productos o servicios. Para saber que ID corresponde al código de estandar consulte la siguiente tabla: [IDs de códigos de estándar](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-est%C3%A1ndar-de-identificaci%C3%B3n-del-producto). |
  | `items.`\*`withholding_taxes[]` | (opcional) Array de objetos (autorretenciones) Este campo sirve para informar las retenciones en la fuente que se aplican al producto o servicio.  <br>No son retenciones que otra persona o empresa te hace a ti, sino retenciones que tú mismo te aplicas como contribuyente.  <br>Por cada retención que te apliques a ti mismo, debes enviar un objeto. |
  | `items.`\*`.withholding_taxes.`\*`.code` | Código de la retención aplicada al producto o servicio.  <br>Para saber el código de la retención consulte el siguiente endpoint: [Tributos de productos](https://martian-spaceship-418933.postman.co/workspace/api.factus.com.co~af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-4efa8bd2-0a34-47c4-9a24-c37fa10b8cb9?active-environment=cd706e17-76b6-4b45-9685-4c03a774a99a) |
  | `items.`\*`.withholding_taxes.`\*`.withhoding_tax_rate` | Porcentaje de la retención aplicada al item. |
