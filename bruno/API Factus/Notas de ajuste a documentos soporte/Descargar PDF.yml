info:
  name: Descargar PDF
  type: http
  seq: 5

http:
  method: GET
  url: "{{url_api}}/v1/adjustment-notes/download-pdf/:number"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: number
      value: NDA40
      type: path
      description: Numero de la nota de ajuste
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200-Descargar PDF
    request:
      url: "{{url_api}}/v1/adjustment-notes/download-pdf/:number"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: number
          value: NDA40
          type: path
          description: Numero de la nota de ajuste
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "status": "OK",
              "message": "Solicitud exitosa",
              "data": {
                  "file_name": "nas09008257590002500000017",
                  "pdf_base_64_encoded": ""
              }
          }
  - name: 404-Descargar PDF
    request:
      url: "{{url_api}}/v1/adjustment-notes/download-pdf/:number"
      method: GET
      headers:
        - name: Accept
          value: application/json
      params:
        - name: number
          value: NDA40
          type: path
          description: Numero de la nota de ajuste
    response:
      statusText: "404"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "status": "Not Found",
              "message": "No se encontró el documento NDA41"
          }

docs: |-
  **Nota:** Es necesario el envio del (access_token) token de acceso para la descarga de la nota de ajuste.  
  para ver como generar el token. use el siguiente link. [Auth endpoint](https://martian-spaceship-418933.postman.co/workspace/api.factus.com.co~af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-d94026db-94e7-430e-81b1-86cd3e7d9de6?ctx=documentation)

  Recuerde que el token de acceso caduca cada hora.

  El endpoint devuelve una nota de ajuste codificada en base64 y el nombre del archivo, deberas decodificar el contenido de pdf_base_64_encoded
