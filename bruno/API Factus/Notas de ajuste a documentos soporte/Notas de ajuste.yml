docs: |-
  Recuerde que el token de acceso caduca cada hora.

  La respuesta del endpoint arroja el total de las notas de ajuste, por pagina 10 resultados, pagina actual, ultima pagina, desde, hasta y los links de navegación entre el endpoint de notas de ajuste, los anteriores campos con el fin de paginar la respuesta.

  Para navegar entre las páginas del endpoint de get Notas de ajuste use el query param page y el número de página al que quiere navegar, si el número de página no existe el objeto data será vacio.
