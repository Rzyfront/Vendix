docs: |-
  **Nota:** Es necesario el envio del (access_token) token de acceso en la creacion de la nota de ajuste.  
  para ver como generar el token. use el siguiente link. [Auth endpoint](https://martian-spaceship-418933.postman.co/workspace/api.factus.com.co~af54fc7a-b3d9-40a7-9f62-273f3ec355b9/request/22150862-d94026db-94e7-430e-81b1-86cd3e7d9de6?ctx=documentation)

  Recuerde que el token de acceso caduca cada hora.

  El endpoint devuelve una nota de ajuste pasando el número de la nota de ajuste como parametro via get

  Para ver un ejemplo de la respuesta dirijase la coleccion de Ver nota de ajuste despliegue el menu para ver un ejemplo de la respuesta.
