info:
  name: Ver nota de ajuste
  type: http
  seq: 3

http:
  method: GET
  url: "{{url_api}}/v1/adjustment-notes/:number"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: number
      value: NDA41
      type: path
      description: Numero de la nota de ajuste
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

