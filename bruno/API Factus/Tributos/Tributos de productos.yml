info:
  name: Tributos de productos
  type: http
  seq: 1

http:
  method: GET
  url: "{{url_api}}/v1/tributes/products?name="
  headers:
    - name: Accept
      value: application/json
  params:
    - name: name
      value: ""
      type: query
      description: Nombre del tributo
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

