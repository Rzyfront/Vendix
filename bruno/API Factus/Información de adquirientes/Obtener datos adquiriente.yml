docs: |-
  ### GET /v1/dian/acquirer

  Este endpoint recupera información sobre un adquiriente basándose en ID y el número del documento de identificación proporcionados.

  ### Descripción de los parametros

  | **Parametro** | Descripción |
  | --- | --- |
  | identificacion_document_id | ID que corresponda al tipo de identificacion. Para saber cual ID corresponde al tipo de identificación consulte la siguiente tabla [IDs tipos de documentos](https://developers.factus.com.co/tablas-de-referencia/tablas/#ids-de-tipos-de-documentos-de-identidad). |
  | identification_number | Número de identificación del comprador |
