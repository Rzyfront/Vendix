info:
  name: Obtener datos adquiriente
  type: http
  seq: 1

http:
  method: GET
  url: "{{url_api}}/v1/dian/acquirer?identification_document_id=3&identification_number=1399991"
  params:
    - name: identification_document_id
      value: "3"
      type: query
    - name: identification_number
      value: "1399991"
      type: query
  auth: inherit

settings:
