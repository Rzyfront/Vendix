<div class="flex flex-col gap-6">
  <!-- Stats Grid -->
  <app-audit-stats
    [stats]="auditStats()"
    [showExtendedStats]="true"
  ></app-audit-stats>

  <!-- Main Content Card -->
  <app-card [padding]="false" overflow="hidden">
    <!-- Table Header (Title, Description, Controls) -->
    <div
      class="p-2 md:px-6 md:py-4 border-b border-[var(--color-border)] flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between"
    >
      <!-- Left: Title & Description -->
      <div class="flex-1 min-w-0">
        <h3 class="text-lg font-semibold text-text-primary">
          Listado de Auditoría
        </h3>
        <p class="hidden sm:block text-xs text-text-secondary mt-0.5">
          Historial completo de acciones realizadas en la plataforma
        </p>
      </div>

      <!-- Right: Controls -->
      <div
        class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto"
      >
        <!-- Search -->
        <div class="w-full sm:w-60">
          <app-inputsearch
            placeholder="Buscar logs..."
            (searchChange)="onSearchChange($event)"
            size="sm"
          ></app-inputsearch>
        </div>

        <!-- Filter Acción -->
        <div class="w-full sm:w-48">
          <app-selector
            placeholder="Todas las Acciones"
            [options]="actionOptions"
            [formControl]="$any(filterForm.get('action'))"
            size="sm"
            variant="outline"
          ></app-selector>
        </div>

        <!-- Filter Recurso -->
        <div class="w-full sm:w-48">
          <app-selector
            placeholder="Todos los Recursos"
            [options]="resourceOptions"
            [formControl]="$any(filterForm.get('resource'))"
            size="sm"
            variant="outline"
          ></app-selector>
        </div>

        <!-- Global Actions -->
        <div class="flex gap-2 items-center sm:ml-auto">
          <app-button
            variant="outline"
            size="sm"
            (clicked)="refreshAuditLogs()"
            [disabled]="isLoading()"
            title="Actualizar"
          >
            <app-icon
              name="refresh"
              [size]="16"
              slot="icon"
              [class.animate-spin]="isLoading()"
            ></app-icon>
          </app-button>
          <app-button
            variant="outline"
            size="sm"
            (clicked)="clearFilters()"
            title="Limpiar"
          >
            <app-icon name="refresh" [size]="16" slot="icon"></app-icon>
          </app-button>
        </div>
      </div>
    </div>

    <!-- Table Content Wrapper -->
    <div class="relative min-h-[400px] p-2 md:p-4">
      <!-- Loading Overlay -->
      <div
        *ngIf="isLoading()"
        class="absolute inset-0 bg-surface/50 z-10 flex items-center justify-center"
      >
        <div
          class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"
        ></div>
      </div>

      <!-- Empty State -->
      <div
        class="p-8 flex justify-center w-full"
        *ngIf="!isLoading() && auditLogs().length === 0"
      >
        <app-empty-state
          icon="file-text"
          [title]="getEmptyStateTitle()"
          [description]="getEmptyStateDescription()"
          actionButtonText="Actualizar"
          actionButtonIcon="refresh-cw"
          [showActionButton]="true"
          (actionClick)="refreshAuditLogs()"
        ></app-empty-state>
      </div>

      <!-- Audit Table -->
      <!-- Audit Table -->
      <app-responsive-data-view
        *ngIf="auditLogs().length > 0"
        [data]="auditLogs()"
        [columns]="tableColumns"
        [actions]="tableActions"
        [cardConfig]="cardConfig"
        [loading]="isLoading()"
        [hoverable]="true"
        [striped]="true"
        size="md"
        (rowClick)="viewLogDetails($event)"
      >
      </app-responsive-data-view>
    </div>

    <!-- Pagination -->
    <div
      class="px-6 py-4 border-t border-border bg-muted/30 flex justify-center"
      *ngIf="auditLogs().length > 0"
    >
      <app-pagination
        [currentPage]="pagination.page"
        [totalPages]="pagination.totalPages"
        [total]="pagination.total"
        [limit]="pagination.limit"
        infoStyle="range"
        (pageChange)="onPageChange($event)"
      />
    </div>
  </app-card>
</div>

<!-- Details Modal -->
<app-audit-details-modal
  [isOpen]="isDetailsModalOpen()"
  (isOpenChange)="isDetailsModalOpen.set($event)"
  [log]="selectedAuditLog()"
></app-audit-details-modal>
