<app-modal
  [isOpen]="isOpen()"
  (isOpenChange)="isOpenChange.emit($event)"
  (cancel)="onCancel()"
  size="md"
  title="Editar sonido de notificación"
  [subtitle]="sound()?.name || ''"
>
  @if (sound()) {
    <form [formGroup]="form" class="space-y-4">
      <!-- Nombre -->
      <app-input
        formControlName="name"
        label="Nombre"
        placeholder="Nombre del sonido"
        [required]="true"
        [control]="form.get('name')"
      ></app-input>

      <!-- Orden -->
      <div class="space-y-1">
        <label class="block text-sm font-medium text-text-primary">
          Orden
        </label>
        <input
          type="number"
          formControlName="sort_order"
          min="0"
          class="w-full px-3 py-2 border border-border rounded-input focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary bg-surface text-text-primary"
          placeholder="0"
        />
        <p class="text-xs text-text-secondary">
          Determina el orden en el listado (menor primero).
        </p>
      </div>

      <p class="text-xs text-text-secondary">
        Para cambiar el archivo de audio, elimina este sonido y crea uno nuevo.
      </p>
    </form>
  }

  <div slot="footer" class="flex justify-end gap-3">
    <app-button variant="outline" (clicked)="onCancel()">
      Cancelar
    </app-button>
    <app-button
      variant="primary"
      (clicked)="onSubmit()"
      [disabled]="form.invalid || isSubmitting()"
      [loading]="isSubmitting()"
    >
      Guardar cambios
    </app-button>
  </div>
</app-modal>
