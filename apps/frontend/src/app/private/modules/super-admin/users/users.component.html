<div class="flex flex-col gap-6">
  <!-- Stats Cards -->
  <app-user-stats [stats]="userStats()"></app-user-stats>

  <!-- Main Content Card -->
  <app-card [padding]="false" overflow="visible">
    <!-- Header (Title & Controls) -->
    <div
      class="p-2 md:px-6 md:py-4 border-b border-[var(--color-border)] flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4"
    >
      <!-- Left Side: Title & Info -->
      <div class="flex-1 min-w-0">
        <h3 class="text-lg font-semibold text-text-primary">
          Listado de Usuarios
        </h3>
        <p class="hidden sm:block text-xs text-text-secondary mt-0.5">
          Gestión de cuentas de usuario y permisos ({{ pagination.total }})
        </p>
      </div>

      <!-- Right Side: Controls -->
      <div class="flex items-center gap-2 w-full md:w-auto">
        <!-- Search -->
        <app-inputsearch
          class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
          placeholder="Buscar usuarios..."
          [debounceTime]="400"
          (searchChange)="onSearchChange($event)"
          size="sm"
        ></app-inputsearch>

        <app-options-dropdown
          class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
          [filters]="filterConfigs"
          [filterValues]="filterValues()"
          [actions]="dropdownActions()"
          [isLoading]="isLoading()"
          (filterChange)="onFilterChange($event)"
          (clearAllFilters)="onClearFilters()"
          (actionClick)="onDropdownAction($event)"
        ></app-options-dropdown>
      </div>
    </div>

    <!-- Table Content -->
    <div class="relative min-h-[400px] p-2 md:p-4">
      <!-- Loading Overlay -->
      @if (isLoading()) {
        <div
          class="absolute inset-0 bg-surface/50 z-10 flex items-center justify-center"
        >
          <div
            class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"
          ></div>
        </div>
      }

      <!-- Table Section -->
      <app-responsive-data-view
        [data]="users()"
        [columns]="tableColumns"
        [actions]="tableActions"
        [cardConfig]="cardConfig"
        [loading]="isLoading()"
        [emptyMessage]="getEmptyStateTitle()"
        (rowClick)="editUser($event)"
        (sort)="onSortChange($event.column, $event.direction)"
      >
        <!-- Empty State internal slot (standard practice) -->
        @if (!isLoading() && users().length === 0) {
          <div class="p-8 flex justify-center w-full">
            <app-empty-state
              icon="users"
              [title]="getEmptyStateTitle()"
              [description]="getEmptyStateDescription()"
              actionButtonText="Crear Usuario"
              (actionClick)="createUser()"
            >
            </app-empty-state>
          </div>
        }
      </app-responsive-data-view>

      <!-- Pagination -->
      <app-pagination
        [currentPage]="pagination.page"
        [totalPages]="pagination.totalPages"
        [total]="pagination.total"
        [limit]="pagination.limit"
        infoStyle="range"
        (pageChange)="onPageChange($event)"
      />
    </div>
  </app-card>

  @defer (when showCreateModal()) {
    <app-user-create-modal
      [(isOpen)]="showCreateModal"
      (onUserCreated)="onUserCreated()"
    ></app-user-create-modal>
  }

  @defer (when showEditModal()) {
    <app-user-edit-modal
      [(isOpen)]="showEditModal"
      [user]="currentUser"
      (onUserUpdated)="onUserUpdated()"
    ></app-user-edit-modal>
  }
</div>
