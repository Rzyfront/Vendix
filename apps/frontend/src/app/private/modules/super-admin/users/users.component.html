<div class="flex flex-col gap-6">
  <!-- Stats Cards -->
  <app-user-stats [stats]="userStats"></app-user-stats>

  <!-- Main Content Card -->
  <app-card [padding]="false" overflow="hidden">
    <!-- Header (Title & Controls) -->
    <div
      class="p-2 md:px-6 md:py-4 border-b border-[var(--color-border)] flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between"
    >
      <!-- Left Side: Title & Info -->
      <div class="flex-1 min-w-0">
        <h3 class="text-lg font-semibold text-text-primary">
          Listado de Usuarios
        </h3>
        <p class="hidden sm:block text-xs text-text-secondary mt-0.5">
          Gestión de cuentas de usuario y permisos ({{ pagination.total }})
        </p>
      </div>

      <!-- Right Side: Controls -->
      <div
        class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto"
      >
        <!-- Search -->
        <div class="w-full sm:w-60">
          <app-inputsearch
            placeholder="Buscar usuarios..."
            [debounceTime]="400"
            (searchChange)="onSearchChange($event)"
            size="sm"
            fullWidth="true"
          ></app-inputsearch>
        </div>

        <!-- Filter Selector (State) -->
        <div class="w-full sm:w-48">
          <form [formGroup]="filterForm">
            <select
              formControlName="state"
              class="w-full px-3 py-1.5 border border-border rounded-md bg-surface text-text focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm h-[38px]"
              [disabled]="isLoading"
            >
              @for (state of userStates; track state) {
                <option [value]="state.value">
                  {{ state.label }}
                </option>
              }
            </select>
          </form>
        </div>

        <!-- Filter Modo Org -->
        <div class="w-full sm:w-48">
          <app-selector
            [options]="orgModes"
            [formControl]="$any(filterForm.get('include_non_production'))"
            size="sm"
            variant="outline"
          ></app-selector>
        </div>

        <!-- Actions -->
        <div class="flex gap-2 items-center sm:ml-auto">
          <app-button
            variant="outline"
            size="sm"
            (clicked)="syncPanelUI()"
            [disabled]="isLoading"
            title="Sincronizar módulos visibles de usuarios admin"
          >
            <app-icon name="shield-check" [size]="16" slot="icon"></app-icon>
            <span class="hidden sm:inline ml-1">Sync Panel UI</span>
          </app-button>

          <app-button
            variant="outline"
            size="sm"
            (clicked)="refreshUsers()"
            [disabled]="isLoading"
            title="Actualizar"
          >
            <app-icon name="refresh-cw" [size]="16" slot="icon"></app-icon>
          </app-button>

          <app-button
            variant="primary"
            size="sm"
            (clicked)="createUser()"
            iconName="plus"
          >
            <span class="hidden sm:inline">Nuevo Usuario</span>
            <span class="sm:hidden">Nuevo</span>
          </app-button>
        </div>
      </div>
    </div>

    <!-- Table Content -->
    <div class="relative min-h-[400px] p-2 md:p-4">
      <!-- Loading Overlay -->
      @if (isLoading) {
        <div
          class="absolute inset-0 bg-surface/50 z-10 flex items-center justify-center"
        >
          <div
            class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"
          ></div>
        </div>
      }

      <!-- Table Section -->
      <app-responsive-data-view
        [data]="users"
        [columns]="tableColumns"
        [actions]="tableActions"
        [cardConfig]="cardConfig"
        [loading]="isLoading"
        [emptyMessage]="getEmptyStateTitle()"
        (rowClick)="editUser($event)"
        (sort)="onSortChange($event.column, $event.direction)"
      >
        <!-- Empty State internal slot (standard practice) -->
        @if (!isLoading && users.length === 0) {
          <div class="p-8 flex justify-center w-full">
            <app-empty-state
              icon="users"
              [title]="getEmptyStateTitle()"
              [description]="getEmptyStateDescription()"
              actionButtonText="Crear Usuario"
              (actionClick)="createUser()"
            >
            </app-empty-state>
          </div>
        }
      </app-responsive-data-view>

      <!-- Pagination -->
      <app-pagination
        [currentPage]="pagination.page"
        [totalPages]="pagination.totalPages"
        [total]="pagination.total"
        [limit]="pagination.limit"
        infoStyle="range"
        (pageChange)="onPageChange($event)"
      />
    </div>
  </app-card>

  @defer (when showCreateModal) {
    <app-user-create-modal
      [(isOpen)]="showCreateModal"
      (onUserCreated)="onUserCreated()"
    ></app-user-create-modal>
  }

  @defer (when showEditModal) {
    <app-user-edit-modal
      [(isOpen)]="showEditModal"
      [user]="currentUser"
      (onUserUpdated)="onUserUpdated()"
    ></app-user-edit-modal>
  }
</div>
