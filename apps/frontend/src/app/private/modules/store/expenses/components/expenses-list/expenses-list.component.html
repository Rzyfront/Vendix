<div class="md:space-y-4">
  <!-- Lista de Gastos -->
  <app-card [responsive]="true" [padding]="false">
    <!-- Search Section: sticky below stats on mobile, normal on desktop -->
    <div
      class="sticky top-[99px] z-10 bg-background px-2 py-1.5 pt-[5px] -mt-[5px] md:mt-0 md:pt-4 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border">
      <div class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4">
        <!-- Title -->
        <h2 class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary">
          Gastos
          @if (meta(); as meta) {
            <span class="text-text-secondary font-normal">
              ({{ meta.total }})
            </span>
          }
        </h2>

        <!-- Search row -->
        <div class="flex items-center gap-2 w-full md:w-auto">
          <app-inputsearch class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            size="sm" placeholder="Buscar gastos..." [debounceTime]="300" [ngModel]="searchTerm()"
          (ngModelChange)="onSearchChange($event)"></app-inputsearch>

          <app-button variant="outline" size="md"
            customClasses="w-10 sm:w-11 !px-0 bg-surface shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none !rounded-[10px] shrink-0"
            (clicked)="create.emit()" title="Nuevo Gasto">
            <app-icon slot="icon" name="plus" [size]="18"></app-icon>
          </app-button>

          <app-options-dropdown class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            [filters]="filterConfigs" [filterValues]="filterValues()" [actions]="dropdownActions" [isLoading]="loading()"
            (filterChange)="onFilterChange($event)" (clearAllFilters)="onClearFilters()"
          (actionClick)="onActionClick($event)"></app-options-dropdown>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    @if (loading()) {
      <div class="p-4 md:p-6 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
        <p class="mt-2 text-text-secondary">Cargando gastos...</p>
      </div>
    }

    <!-- Empty State -->
    @if (!loading() && expenses().length === 0) {
      <app-empty-state
        icon="coins"
        [title]="getEmptyStateTitle()"
        [description]="getEmptyStateDescription()"
        actionButtonText="Crear nuevo gasto"
        [showActionButton]="!hasFilters"
        [showRefreshButton]="true"
        [showClearFilters]="hasFilters"
        (actionClick)="create.emit()"
        (refreshClick)="refresh.emit()"
        (clearFiltersClick)="onClearFilters()"
      ></app-empty-state>
    }

    <!-- Expenses List -->
    @if (!loading() && expenses().length > 0) {
      <div class="px-2 pb-2 pt-3 md:p-4">
        <app-responsive-data-view [data]="expenses()" [columns]="columns" [actions]="tableActions" [cardConfig]="cardConfig"
          [loading]="loading()" emptyMessage="No hay gastos registrados" emptyIcon="coins"
        (rowClick)="onRowClick($event)"></app-responsive-data-view>
        <!-- Pagination -->
        @if (meta(); as meta) {
          <div class="flex justify-center pt-3 mt-3 border-t border-border">
            <app-pagination
              [currentPage]="meta.page"
              [totalPages]="meta.totalPages"
              [total]="meta.total"
              [limit]="meta.limit"
              (pageChange)="onPageChange($event)"
            ></app-pagination>
          </div>
        }
      </div>
    }
  </app-card>
</div>
