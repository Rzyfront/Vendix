<div class="md:space-y-4">
  <div
    class="md:bg-surface md:rounded-xl md:shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:border md:border-border">
    <!-- Search Section -->
    <div
      class="sticky top-[99px] z-10 bg-background px-2 py-1.5 pt-[5px] -mt-[5px] md:mt-0 md:pt-4 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border">
      <div class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4">
        <h2 class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary">
          Nominas
          <span *ngIf="meta$ | async as meta" class="text-text-secondary font-normal">
            ({{ meta.total }})
          </span>
        </h2>

        <div class="flex items-center gap-2 w-full md:w-auto">
          <app-inputsearch class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            size="sm" placeholder="Buscar nominas..." [debounceTime]="300" [ngModel]="searchTerm"
            (ngModelChange)="onSearchChange($event)"></app-inputsearch>

          <app-button variant="outline" size="sm"
            customClasses="w-9 h-9 !px-0 bg-surface shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none !rounded-[10px] shrink-0"
            (clicked)="create.emit()" title="Nueva Nomina">
            <app-icon slot="icon" name="plus" [size]="18"></app-icon>
          </app-button>

          <app-options-dropdown class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            [filters]="filterConfigs" [filterValues]="filterValues" [actions]="dropdownActions" [isLoading]="loading"
            (filterChange)="onFilterChange($event)" (clearAllFilters)="onClearFilters()"
            (actionClick)="onActionClick($event)"></app-options-dropdown>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="p-4 md:p-6 text-center">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
      <p class="mt-2 text-text-secondary">Cargando nominas...</p>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && payrollRuns.length === 0" class="p-8 text-center">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center">
        <app-icon name="file-text" [size]="32" class="text-gray-400"></app-icon>
      </div>
      <h3 class="text-lg font-medium text-text-primary mb-2">{{ getEmptyStateTitle() }}</h3>
      <p class="text-text-secondary mb-4">{{ getEmptyStateDescription() }}</p>
      <div class="flex flex-col items-center sm:flex-row gap-2 justify-center">
        <app-button variant="primary" (clicked)="create.emit()">
          Crear nueva nomina
        </app-button>
        <app-button *ngIf="hasFilters" variant="ghost" (clicked)="onClearFilters()">
          Limpiar filtros
        </app-button>
      </div>
    </div>

    <!-- Payroll Runs List -->
    <div *ngIf="!loading && payrollRuns.length > 0" class="px-2 pb-2 pt-3 md:p-4">
      <app-responsive-data-view [data]="payrollRuns" [columns]="columns" [actions]="tableActions"
        [cardConfig]="cardConfig" [loading]="loading" emptyMessage="No hay nominas registradas" emptyIcon="file-text"
        (rowClick)="onRowClick($event)"></app-responsive-data-view>

      <!-- Pagination -->
      <div *ngIf="meta$ | async as meta" class="flex justify-center pt-3 mt-3 border-t border-border">
        <app-pagination
          [currentPage]="meta.page"
          [totalPages]="meta.totalPages"
          [total]="meta.total"
          [limit]="meta.limit"
          (pageChange)="onPageChange($event)"
        ></app-pagination>
      </div>
    </div>
  </div>
</div>
