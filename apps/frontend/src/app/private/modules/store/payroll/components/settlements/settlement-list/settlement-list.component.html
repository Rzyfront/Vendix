<div class="md:space-y-4">
  <!-- Lista de Liquidaciones -->
  <app-card [responsive]="true" [padding]="false" customClasses="md:min-h-[600px]">
    <!-- Search Section: sticky below stats on mobile, normal on desktop -->
    <div
      class="sticky top-[99px] z-10 bg-background px-2 py-1.5 -mt-[5px]
              md:mt-0 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border">
      <div class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4">
        <!-- Title - smaller on mobile, larger on desktop -->
        <h2
          class="text-[13px] font-semibold text-text-secondary tracking-wide
                   md:text-lg md:font-semibold md:text-text-primary md:tracking-normal">
          Liquidaciones
          <span class="font-normal text-text-secondary/50 md:font-semibold md:text-text-primary">
            ({{ settlements().length }})
          </span>
        </h2>

        <!-- Search row - horizontal on mobile -->
        <div class="flex items-center gap-2 w-full md:w-auto">
          <app-inputsearch
            class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            placeholder="Buscar liquidacion..."
            [debounceTime]="300"
            [ngModel]="searchTerm"
            (ngModelChange)="onSearchChange($event)">
          </app-inputsearch>

          <app-button
            variant="outline"
            size="md"
            customClasses="w-10 sm:w-11 !px-0 bg-surface shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none !rounded-[10px] shrink-0"
            (clicked)="create.emit()"
            title="Nueva Liquidacion">
            <app-icon slot="icon" name="plus" [size]="18"></app-icon>
          </app-button>

          <app-options-dropdown
            class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            [filters]="filterConfigs"
            [filterValues]="filterValues"
            [actions]="dropdownActions"
            [isLoading]="isLoading()"
            (filterChange)="onFilterChange($event)">
          </app-options-dropdown>
        </div>
      </div>
    </div>

    <!-- Estado de Carga -->
    @if (isLoading()) {
      <div class="p-4 md:p-6 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
        <p class="mt-2 text-text-secondary">Cargando liquidaciones...</p>
      </div>
    }

    <!-- Estado Vacío -->
    @if (!isLoading() && settlements().length === 0) {
      <app-empty-state
        icon="file-minus"
        title="No hay liquidaciones registradas"
        description="Comience creando su primera liquidacion."
        actionButtonText="Crear Liquidacion"
        [showActionButton]="true"
        [showRefreshButton]="true"
        (actionClick)="create.emit()"
        (refreshClick)="search.emit(searchTerm)">
      </app-empty-state>
    }

    <!-- Settlements List -->
    @if (!isLoading() && settlements().length > 0) {
      <div class="px-2 pb-2 pt-3 md:p-4">
        <app-responsive-data-view
          [data]="settlements()"
          [columns]="columns"
          [cardConfig]="cardConfig"
          [actions]="actions"
          [loading]="isLoading()"
          emptyMessage="No hay liquidaciones registradas"
          emptyIcon="file-minus"
          (rowClick)="view.emit($event)">
        </app-responsive-data-view>
      </div>
    }
  </app-card>
</div>
