<!-- Unified container: search + data view -->
<app-card
  [responsive]="true"
  [padding]="false"
  customClasses="md:min-h-[600px] md:overflow-hidden"
>
  <!-- Search Section (sticky mobile, static desktop) -->
  <div
    class="sticky top-[99px] z-10 bg-background px-2 py-1.5 -mt-[5px] md:mt-0 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border"
  >
    <div
      class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4"
    >
      <h2
        class="text-[13px] font-semibold text-text-secondary tracking-wide md:text-lg md:font-semibold md:text-text-primary md:tracking-normal"
      >
        Adelantos
        <span
          class="font-normal text-text-secondary/50 md:font-semibold md:text-text-primary"
          >({{ advances().length }})</span
        >
      </h2>
      <div class="flex items-center gap-2 w-full md:w-auto">
        <app-inputsearch
          class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
          placeholder="Buscar adelanto..."
          [debounceTime]="300"
          (searchChange)="onSearch($event)"
        ></app-inputsearch>

        <app-options-dropdown
          class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
          [filters]="filterConfigs"
          [filterValues]="filterValues"
          [actions]="dropdownActions"
          (filterChange)="onFilterChange($event)"
          (clearAllFilters)="clearFilters()"
          (actionClick)="onActionClick($event)"
        ></app-options-dropdown>
      </div>
    </div>
  </div>

  <!-- Responsive Data View -->
  <div class="px-2 pb-2 pt-3 md:p-4">
    <app-responsive-data-view
      [data]="advances()"
      [columns]="columns"
      [cardConfig]="cardConfig"
      [actions]="actions"
      [loading]="loading()"
      emptyMessage="No hay adelantos registrados"
      emptyIcon="hand-coins"
      (rowClick)="viewDetail.emit($event)"
    ></app-responsive-data-view>
  </div>
</app-card>
