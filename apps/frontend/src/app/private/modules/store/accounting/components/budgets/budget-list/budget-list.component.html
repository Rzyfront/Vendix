<div class="w-full">
  <!-- Stats: Sticky on mobile, static on desktop -->
  <div
    class="stats-container sticky top-0 z-20 bg-background md:static md:bg-transparent"
  >
    <app-stats
      title="Total Presupuestos"
      [value]="stats().total"
      iconName="clipboard"
      iconBgColor="bg-blue-100"
      iconColor="text-blue-600"
      [clickable]="false"
    ></app-stats>
    <app-stats
      title="Borradores"
      [value]="stats().draft"
      iconName="edit"
      iconBgColor="bg-amber-100"
      iconColor="text-amber-600"
      [clickable]="false"
    ></app-stats>
    <app-stats
      title="Activos"
      [value]="stats().active"
      iconName="check-circle"
      iconBgColor="bg-emerald-100"
      iconColor="text-emerald-600"
      [clickable]="false"
    ></app-stats>
    <app-stats
      title="Cerrados"
      [value]="stats().closed"
      iconName="lock"
      iconBgColor="bg-gray-100"
      iconColor="text-gray-600"
      [clickable]="false"
    ></app-stats>
  </div>

  <!-- Unified Container: Search Header + Data -->
  <app-card [responsive]="true" [padding]="false">
    <!-- Search Header -->
    <div
      class="sticky top-[99px] z-10 bg-background px-2 py-1.5 -mt-[5px] md:mt-0 md:static md:bg-transparent md:px-4 md:py-4 md:border-b md:border-border"
    >
      <div
        class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4"
      >
        <h2
          class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary"
        >
          Presupuestos ({{ filtered_budgets().length }})
        </h2>
        <div class="flex items-center gap-2 w-full md:w-auto">
          <app-inputsearch
            class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            placeholder="Buscar presupuestos..."
            [debounceTime]="300"
            (searchChange)="onSearchChange($event)"
          ></app-inputsearch>
          <app-options-dropdown
            class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            [filters]="filter_configs"
            [actions]="dropdown_actions"
            (filterChange)="onFilterChange($event)"
            (actionClick)="onActionClick($event)"
          ></app-options-dropdown>
        </div>
      </div>
    </div>

    <!-- Data Content -->
    <div class="relative p-2 md:p-4">
      <app-responsive-data-view
        [data]="filtered_budgets()"
        [columns]="columns"
        [cardConfig]="card_config"
        [actions]="table_actions"
        [loading]="loading()"
        emptyMessage="No se encontraron presupuestos"
        emptyIcon="clipboard"
        (rowClick)="onRowClick($event)"
      ></app-responsive-data-view>
    </div>
  </app-card>

  @defer (when isCreateModalOpen()) {
    <vendix-budget-create-modal
      [isOpen]="isCreateModalOpen()"
      (isOpenChange)="isCreateModalOpen.set($event)"
      (created)="onBudgetCreated()"
    ></vendix-budget-create-modal>
  }
</div>
