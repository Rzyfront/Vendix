<app-payment-modal
  context="order"
  [open]="isOpen()"
  (openChange)="isOpenChange.emit($event)"
  [title]="modalTitle()"
  [subtitle]="modalSubtitle()"
  size="lg"
  [submitLabel]="submitLabel()"
  [amount]="chargeAmount()"
  [remainingBalance]="collectorRemaining()"
  [paymentMethods]="collectorMethods()"
  [autoLoad]="false"
  [installments]="installments()"
  [preSelectedInstallment]="preSelectedInstallment()"
  [isProcessing]="isProcessing()"
  [allowAmountOverride]="isCreditOrder()"
  [allowCredit]="false"
  [allowWompi]="false"
  [allowWallet]="false"
  [showKeypad]="true"
  (submit)="paymentSubmitted.emit($event)"
  (closed)="closed.emit()"
/>
