<div class="space-y-6 w-full max-w-[1600px] mx-auto md:py-4">
  <!-- Filter Bar -->
  <div class="flex items-center justify-between gap-3 sticky top-0 z-10 bg-white px-4 py-3 border-b border-border rounded-lg mx-1">
    <div class="flex items-center gap-2.5 min-w-0">
      <div class="hidden md:flex w-10 h-10 rounded-lg bg-[var(--color-background)] items-center justify-center border border-[var(--color-border)] shadow-sm shrink-0">
        <app-icon name="trophy" class="text-[var(--color-primary)]"></app-icon>
      </div>
      <h1 class="text-base md:text-lg font-bold text-[var(--color-text-primary)] leading-tight truncate">
        Productos Más Vendidos
      </h1>
    </div>

    <div class="flex items-center gap-2 md:gap-3 shrink-0">
      <vendix-date-range-filter
          [value]="dateRange()"
          (valueChange)="onDateRangeChange($event)"
        ></vendix-date-range-filter>
        <!-- Toggle Chart/Table -->
        <div class="flex rounded-lg border border-border overflow-hidden">
          <button
            (click)="activeView.set('chart')"
            class="flex items-center gap-1.5 px-3 py-1.5 text-sm transition-colors"
            [class]="activeView() === 'chart' ? 'bg-black text-white' : 'bg-surface text-text-secondary hover:bg-background'"
          >
            <app-icon name="bar-chart-2" [size]="16"></app-icon>
            Gráficas
          </button>
          <button
            (click)="activeView.set('table')"
            class="flex items-center gap-1.5 px-3 py-1.5 text-sm transition-colors"
            [class]="activeView() === 'table' ? 'bg-black text-white' : 'bg-surface text-text-secondary hover:bg-background'"
          >
            <app-icon name="table" [size]="16"></app-icon>
            Tabla
          </button>
        </div>
    </div>
  </div>

  @if (activeView() === 'chart') {
  <!-- Chart -->
  <app-card
    shadow="none"
    [padding]="false"
    overflow="hidden"
    [showHeader]="true"
  >
    <div slot="header" class="flex flex-col">
      <span class="text-sm font-bold text-[var(--color-text-primary)]"
        >Top 10 por Ingresos</span
      >
      <span class="text-xs text-[var(--color-text-secondary)]"
        >Productos con mayor facturación en el período</span
      >
    </div>
    <div class="p-4">
      @if (loadingTopSellers()) {
        <div class="h-80 flex items-center justify-center">
          <div
            class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"
          ></div>
        </div>
      } @else {
        @defer (on viewport) {
          <app-chart
            [options]="topSellersChartOptions()"
            size="large"
          ></app-chart>
        } @placeholder {
          <div class="h-80 bg-surface-secondary animate-pulse rounded-xl"></div>
        }
      }
    </div>
  </app-card>
  }

  @if (activeView() === 'table') {
  <!-- Top Sellers Table -->
  <app-card
    shadow="none"
    [padding]="false"
    overflow="hidden"
    [showHeader]="true"
  >
    <div slot="header" class="flex flex-col">
      <span class="text-sm font-bold text-[var(--color-text-primary)]"
        >Detalle de Más Vendidos</span
      >
    </div>

    <div class="p-4">
      <app-responsive-data-view
        [data]="topSellers()"
        [columns]="tableColumns"
        [cardConfig]="cardConfig"
        [loading]="(loadingTopSellers()) ?? false"
        emptyMessage="No hay datos de ventas en este período"
        emptyIcon="trophy"
      ></app-responsive-data-view>
    </div>
  </app-card>
  }
</div>
