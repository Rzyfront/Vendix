<ng-container>
  <app-stats
    title="Total Vehículos"
    [value]="stats().total"
    smallText="Vehículos registrados"
    iconName="truck"
    iconBgColor="bg-blue-100"
    iconColor="text-blue-500"
    [loading]="loading()"
  ></app-stats>

  <app-stats
    title="Activos"
    [value]="stats().active"
    smallText="Disponibles para rutas"
    iconName="check-circle"
    iconBgColor="bg-emerald-100"
    iconColor="text-emerald-500"
    [loading]="loading()"
  ></app-stats>

  <app-stats
    title="Inactivos"
    [value]="stats().inactive"
    smallText="Fuera de servicio"
    iconName="x-circle"
    iconBgColor="bg-gray-100"
    iconColor="text-gray-500"
    [loading]="loading()"
  ></app-stats>
</ng-container>
