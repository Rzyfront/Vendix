<div class="w-full overflow-x-hidden">
  <app-sticky-header
    title="Planes de Gimnasio"
    subtitle="Tarifas y membresías que ofreces a tus socios"
    icon="dumbbell"
    variant="glass"
    [actions]="[
      {
        id: 'create',
        label: 'Nuevo Plan',
        icon: 'plus',
        variant: 'primary',
      },
    ]"
    (actionClicked)="onActionClick($event)"
  />

  <div
    class="stats-container sticky top-[52px] z-20 bg-background md:static md:bg-transparent"
  >
    <app-stats
      title="Total Planes"
      [value]="stats().total"
      smallText="Planes registrados en la tienda"
      iconName="dumbbell"
      iconBgColor="bg-blue-100"
      iconColor="text-blue-600"
    />
    <app-stats
      title="Activos"
      [value]="stats().active"
      smallText="Disponibles para inscribir socios"
      iconName="check-circle"
      iconBgColor="bg-green-100"
      iconColor="text-green-600"
    />
    <app-stats
      title="Inactivos"
      [value]="stats().inactive"
      smallText="Ocultos para nuevas inscripciones"
      iconName="x-circle"
      iconBgColor="bg-amber-100"
      iconColor="text-amber-600"
    />
  </div>

  <app-card [responsive]="true" [padding]="false" overflow="visible">
    <div
      class="sticky top-[99px] z-10 bg-background px-2 py-1.5 -mt-[5px] md:mt-0 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border"
    >
      <div
        class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4"
      >
        <h2
          class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary"
        >
          Planes ({{ totalItems() }})
        </h2>

        <div class="flex items-center gap-2 w-full md:w-auto">
          <app-inputsearch
            class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            size="sm"
            placeholder="Buscar plan..."
            [debounceTime]="300"
            [ngModel]="searchTerm()"
            (ngModelChange)="onSearch($event)"
          />
          <app-options-dropdown
            class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            [filters]="filterConfigs"
            [filterValues]="filterValues"
            [actions]="dropdownActions()"
            [isLoading]="isLoading()"
            (filterChange)="onFilterChange($event)"
            (clearAllFilters)="clearFilters()"
            (actionClick)="onActionClick($event)"
          />
        </div>
      </div>
    </div>

    @if (isLoading()) {
      <div class="p-4 md:p-6 text-center">
        <div
          class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"
        ></div>
        <p class="mt-2 text-text-secondary">Cargando planes...</p>
      </div>
    }

    @if (!isLoading() && plans().length === 0) {
      <app-empty-state
        icon="dumbbell"
        [title]="getEmptyStateTitle()"
        [description]="getEmptyStateDescription()"
        actionButtonText="Crear Plan"
        [showActionButton]="!hasFilters"
        [showRefreshButton]="true"
        [showClearFilters]="hasFilters"
        (actionClick)="createPlan()"
        (refreshClick)="loadPlans()"
        (clearFiltersClick)="clearFilters()"
      />
    }

    @if (!isLoading() && plans().length > 0) {
      <div class="px-2 pb-2 pt-3 md:p-4">
        <app-responsive-data-view
          [data]="plans()"
          [columns]="tableColumns"
          [cardConfig]="cardConfig"
          [actions]="tableActions()"
          [loading]="isLoading()"
          [sortable]="true"
          emptyMessage="No hay planes registrados"
          emptyIcon="dumbbell"
          (rowClick)="onRowClick($event)"
        />
        <div class="mt-4 flex justify-center">
          <app-pagination
            [currentPage]="filters().page"
            [totalPages]="totalPages()"
            [total]="totalItems()"
            [limit]="filters().limit"
            (pageChange)="onPageChange($event)"
          />
        </div>
      </div>
    }
  </app-card>
</div>
