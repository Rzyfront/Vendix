<app-sticky-header
  [title]="isEditMode() ? 'Editar plan' : 'Nuevo plan'"
  [subtitle]="
    isEditMode()
      ? 'Modifica la tarifa, vigencia y límites del plan de membresía.'
      : 'Define la tarifa, vigencia y límites del plan de membresía.'
  "
  icon="dumbbell"
  [showBackButton]="true"
  backRoute="/admin/memberships/plans"
  [actions]="headerActions()"
  (actionClicked)="onHeaderAction($event)"
></app-sticky-header>

<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="space-y-4 md:space-y-6 px-2 pb-4 md:px-0 md:pb-6"
>
  <app-card [responsive]="true" [padding]="true" [overflow]="'visible'">
    <div class="space-y-4">
      <div class="flex items-start gap-2">
        <app-icon name="dumbbell" size="18" class="text-primary-600 mt-0.5" />
        <div>
          <h2 class="text-base font-bold text-gray-900">Datos del plan</h2>
          <p class="text-xs text-gray-500 mt-0.5">
            El código identifica el plan de forma única en la tienda.
          </p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <app-input
          formControlName="code"
          label="Código"
          placeholder="Ej. MENSUAL, ANUAL, PREMIUM"
          [required]="true"
          tooltipText="Código único del plan dentro de la tienda."
        />
        <app-input
          formControlName="name"
          label="Nombre"
          placeholder="Ej. Plan Mensual"
          [required]="true"
        />
      </div>

      <app-textarea
        formControlName="description"
        label="Descripción"
        placeholder="Describe qué incluye el plan."
        [rows]="3"
        [maxlength]="2000"
      />
    </div>
  </app-card>

  <app-card [responsive]="true" [padding]="true" [overflow]="'visible'">
    <div class="space-y-4">
      <div class="flex items-start gap-2">
        <app-icon name="tag" size="18" class="text-primary-600 mt-0.5" />
        <div>
          <h2 class="text-base font-bold text-gray-900">Tarifa y vigencia</h2>
          <p class="text-xs text-gray-500 mt-0.5">
            Precio base (sin impuestos) y duración del período.
          </p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-text-primary">Precio</label>
          <input
            appCurrencyInput
            formControlName="price"
            placeholder="0"
            class="w-full px-3 py-2 rounded-lg border border-border bg-background text-sm text-text-primary outline-none focus:border-primary"
          />
          <span class="text-xs text-text-muted"
            >Precio base del plan, sin impuestos.</span
          >
        </div>

        <app-selector
          formControlName="currency"
          label="Moneda"
          placeholder="Selecciona moneda"
          [options]="currencyOptions"
          [required]="true"
        />

        <app-input
          formControlName="duration_days"
          label="Vigencia (días)"
          type="number"
          placeholder="30"
          [min]="1"
          [required]="true"
          tooltipText="Días que dura un período de la membresía."
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <app-input
          formControlName="access_limit_per_period"
          label="Accesos por período"
          type="number"
          placeholder="Ilimitado"
          [min]="0"
          tooltipText="Máximo de ingresos por período. Vacío = ilimitado."
        />
        <app-input
          formControlName="class_limit_per_period"
          label="Clases por período"
          type="number"
          placeholder="Ilimitado"
          [min]="0"
          tooltipText="Máximo de clases por período. Vacío = ilimitado."
        />
        <app-input
          formControlName="sort_order"
          label="Orden"
          type="number"
          placeholder="0"
          [min]="0"
          tooltipText="Orden de aparición en listados."
        />
      </div>

      <app-setting-toggle
        formControlName="is_active"
        label="Plan activo"
        description="Disponible para inscribir nuevos socios."
      />
    </div>
  </app-card>

  <app-card [responsive]="true" [padding]="true" [overflow]="'visible'">
    <div class="space-y-4">
      <div class="flex items-start gap-2">
        <app-icon name="list" size="18" class="text-primary-600 mt-0.5" />
        <div>
          <h2 class="text-base font-bold text-gray-900">
            Beneficios incluidos
          </h2>
          <p class="text-xs text-gray-500 mt-0.5">
            Un beneficio por línea (opcional).
          </p>
        </div>
      </div>

      <app-textarea
        formControlName="benefits"
        label="Beneficios"
        placeholder="Acceso a sala de pesas&#10;Clases grupales&#10;Casillero"
        [rows]="4"
      />
    </div>
  </app-card>
</form>
