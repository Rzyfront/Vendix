<div class="w-full overflow-x-hidden">
  <app-sticky-header
    title="Gestión de mesas"
    subtitle="Crea, edita y posiciona las mesas del restaurante"
    icon="settings"
    variant="glass"
    [showBackButton]="true"
    backRoute="/admin/restaurant-ops/tables"
    [actions]="headerActions()"
    (actionClicked)="onHeaderAction($event)"
  />

  <div
    class="stats-container sticky top-[52px] z-20 bg-background md:static md:bg-transparent"
  >
    <app-stats
      title="Total"
      [value]="stats().total"
      smallText="Mesas registradas"
      iconName="table"
      iconBgColor="bg-blue-100"
      iconColor="text-blue-600"
    />
    <app-stats
      title="Disponibles"
      [value]="stats().available"
      smallText="Listas para abrir cuenta"
      iconName="check"
      iconBgColor="bg-green-100"
      iconColor="text-green-600"
    />
    <app-stats
      title="Ocupadas"
      [value]="stats().occupied"
      smallText="Con cuenta abierta"
      iconName="users"
      iconBgColor="bg-red-100"
      iconColor="text-red-600"
    />
    <app-stats
      title="Reservadas / Limpieza"
      [value]="stats().reserved + stats().cleaning"
      smallText="Bloqueadas o en reset"
      iconName="clock"
      iconBgColor="bg-amber-100"
      iconColor="text-amber-600"
    />
  </div>

  <div class="p-2 md:p-4">
    <app-card [responsive]="true" [padding]="false" overflow="visible">
      <!-- header: title left, view switch right -->
      <div class="px-2 py-1.5 md:px-6 md:py-4 md:border-b md:border-border">
        <div
          class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4"
        >
          <h2
            class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary"
          >
            Mesas ({{ tables().length }})
          </h2>
          <div class="flex items-center gap-2 w-full md:w-auto justify-end">
            <app-input-buttons
              [options]="viewOptions"
              [ngModel]="view()"
              (ngModelChange)="setView($event)"
              [equalWidth]="false"
              [hideLabelsOnMobile]="true"
              customWrapperClass="!w-auto !mt-0"
              customContainerClass="!h-9 !rounded-lg"
            ></app-input-buttons>
            <app-button
              variant="outline"
              size="md"
              customClasses="w-10 sm:w-11 !px-0 bg-surface shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none !rounded-[10px] shrink-0"
              (clicked)="openCreate()"
              title="Nueva mesa"
            >
              <app-icon slot="icon" name="plus" [size]="18"></app-icon>
            </app-button>
          </div>
        </div>
      </div>

      <!-- body -->
      <div class="px-2 pb-2 pt-3 md:p-4">
        @if (isLoading()) {
          <div class="loading">
            <app-spinner size="md"></app-spinner>
            <p>Cargando mesas…</p>
          </div>
        } @else if (view() === 'table') {
          <app-responsive-data-view
            [data]="rows()"
            [columns]="columns()"
            [actions]="actions()"
            [cardConfig]="cardConfig()"
            [emptyMessage]="'Aún no hay mesas configuradas.'"
            [emptyTitle]="'Sin mesas'"
            [emptyDescription]="'Crea la primera mesa con el botón Nueva mesa.'"
            [emptyActionText]="'Nueva mesa'"
            [emptyActionIcon]="'plus'"
            [showEmptyAction]="true"
            (emptyActionClick)="openCreate()"
            [loading]="isLoading()"
            [striped]="true"
            [hoverable]="true"
          ></app-responsive-data-view>
        } @else {
          <p class="text-xs text-text-secondary mb-2">
            Reposiciona las mesas en el lienzo. Los cambios se guardan
            automáticamente al soltar.
          </p>
          <app-table-floor-map
            [tables]="tables()"
            [editable]="true"
            (tableClicked)="openEdit($event)"
            (tableMoved)="onTableMoved($event)"
          />
        }
      </div>
    </app-card>
  </div>

  <app-table-form-modal
    [isOpen]="isFormOpen()"
    [table]="editingTable()"
    [loading]="isFormLoading()"
    (isOpenChange)="closeForm()"
    (saved)="onFormSaved()"
  />

  <app-table-qr-modal
    [isOpen]="isQrOpen()"
    [table]="qrTable()"
    (isOpenChange)="closeQr()"
  />
</div>
