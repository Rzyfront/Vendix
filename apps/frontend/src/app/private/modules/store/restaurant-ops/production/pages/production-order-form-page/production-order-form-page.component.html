<div class="w-full overflow-x-hidden">
  <app-sticky-header
    title="Nueva Producción"
    subtitle="Crear una orden de producción (sub-receta en lote)"
    icon="flame"
    variant="glass"
  />

  <div class="px-2 py-3 md:p-4">
    <app-card title="Datos de la producción" subtitle="Define el producto preparado, la receta y la cantidad planeada">
      <form
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
        class="grid grid-cols-1 md:grid-cols-2 gap-4"
      >
        <app-selector
          label="Producto preparado"
          placeholder="Selecciona el producto a producir"
          [options]="productOptions()"
          [required]="true"
          [disabled]="isLoadingProducts()"
          [formControl]="productIdControl"
        />

        <app-selector
          label="Receta"
          [placeholder]="
            !productIdControl.value
              ? 'Primero selecciona un producto'
              : isLoadingRecipes()
                ? 'Cargando recetas...'
                : recipeOptions().length === 0
                  ? 'Este producto no tiene recetas activas'
                  : 'Selecciona la receta a producir'
          "
          [options]="recipeOptions()"
          [required]="true"
          [disabled]="!productIdControl.value || isLoadingRecipes()"
          [formControl]="recipeIdControl"
        />

        <app-input
          type="number"
          [label]="'Cantidad planeada (' + (selectedProductUnit() ?? 'unidades') + ')'"
          placeholder="Ej. 10"
          step="0.01"
          [min]="0"
          helperText="En la unidad de rendimiento de la receta (yield_unit)"
          [formControl]="plannedQtyControl"
        />

        <app-textarea
          label="Notas (opcional)"
          placeholder="Notas internas de la producción"
          [formControl]="notesControl"
          [rows]="3"
        />

        <div class="md:col-span-2 flex flex-col-reverse md:flex-row md:justify-end gap-2 pt-2">
          <app-button
            variant="outline"
            label="Cancelar"
            icon="x"
            (click)="onCancel()"
            [disabled]="isSubmitting()"
          />
          <app-button
            variant="primary"
            type="submit"
            label="Crear producción"
            icon="check"
            [disabled]="isSubmitting() || form.invalid"
            [loading]="isSubmitting()"
          />
        </div>
      </form>
    </app-card>
  </div>
</div>
