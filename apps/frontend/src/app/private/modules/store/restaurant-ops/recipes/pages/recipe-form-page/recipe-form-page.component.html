<app-sticky-header
  [title]="isEditMode() ? 'Editar receta' : 'Nueva receta'"
  [subtitle]="
    isEditMode()
      ? 'Modifica el rendimiento, la merma y los componentes de la receta.'
      : 'Define el rendimiento, la merma y los insumos que componen el plato.'
  "
  [actions]="headerActions()"
  (actionClicked)="onHeaderAction($event)"
></app-sticky-header>

<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="space-y-4 md:space-y-6 px-2 pb-4 md:px-0 md:pb-6"
>
  <!-- Inline error banner: backup to the toast, ALWAYS visible. -->
  @if (submitError(); as err) {
    <div
      role="alert"
      aria-live="assertive"
      class="flex items-start gap-2 p-3 rounded-md border border-red-200 bg-red-50 text-red-900 text-sm"
    >
      <app-icon name="x-circle" [size]="18" class="text-red-600 mt-0.5 shrink-0" />
      <div>
        <p class="font-semibold">No se pudo guardar la receta</p>
        <p class="text-red-700 mt-0.5">{{ err }}</p>
      </div>
    </div>
  }
  <!-- overflow visible so the searchable selector dropdown (yield_unit)
       is not clipped by the card's md:overflow-hidden. -->
  <app-card [responsive]="true" [padding]="true" [overflow]="'visible'">
    <div class="space-y-4">
      <div class="flex items-start gap-2">
        <app-icon
          name="utensils"
          size="18"
          class="text-primary-600 mt-0.5"
        ></app-icon>
        <div>
          <h2 class="text-base font-bold text-gray-900">
            Producto de rendimiento
          </h2>
          <p class="text-xs text-gray-500 mt-0.5">
            El plato o sub-receta que se produce con esta lista de insumos.
            Solo se muestran productos
            <span class="font-semibold">preparados</span> o marcados como
            <span class="font-semibold">producidos en lote</span>.
          </p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <app-selector
          formControlName="product_id"
          label="Producto"
          placeholder="Selecciona un plato o sub-receta"
          [options]="yieldOptions()"
          [required]="true"
          [disabled]="isEditMode() || isLoadingProducts()"
          tooltipText="El plato o sub-receta que produces con estos insumos. Una receta por producto. En modo edición este campo se bloquea."
        />

        <app-selector
          formControlName="yield_unit"
          label="Unidad de rendimiento"
          placeholder="Selecciona una unidad"
          [options]="yieldUnitOptions"
          [searchable]="true"
          [required]="true"
          tooltipText="En qué unidad mides lo que produce la receta (porción, plato, g, ml…)."
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <app-input
          formControlName="yield_quantity"
          label="Rendimiento"
          type="number"
          placeholder="1"
          [min]="0"
          step="0.0001"
          [required]="true"
          tooltipText="Cuánto produce un lote de la receta, en la unidad de rendimiento."
        />

        <app-input
          formControlName="waste_percent"
          label="Merma global (%)"
          type="number"
          placeholder="0"
          [min]="0"
          [max]="100"
          step="0.5"
          tooltipText="Pérdida del plato terminado por el proceso (cocción, evaporación, residuo). Se aplica sobre el rendimiento total."
        />

        <app-setting-toggle
          formControlName="is_active"
          label="Receta activa"
          description="Disponible para producción y costeo."
        />
      </div>

      <app-textarea
        formControlName="preparation_notes"
        label="Notas de preparación"
        placeholder="Pasos, técnica, recomendaciones, temperatura, etc."
        [rows]="4"
        [maxlength]="2000"
      />
    </div>
  </app-card>

  <!-- overflow visible so the searchable component dropdown is not clipped by
       the card (default card overflow is hidden on md+). -->
  <app-card [responsive]="true" [padding]="true" [overflow]="'visible'">
    <app-recipe-items-editor [items]="itemsArray" />
  </app-card>
</form>
