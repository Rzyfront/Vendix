<!-- Paso · Consumo. Réplica del bloque "fulfillment-section" del paso Cobro,
     SIN el gate @if(isRestaurantWithPrepared()): el shell decide montarlo o no
     (restaurante ∧ intent ≠ delivery). -->
<div class="consumo-step">
  <div class="fulfillment-section">
    <div class="fulfillment-section-title">
      <app-icon name="utensils" [size]="16"></app-icon>
      <span>Tipo de servicio</span>
    </div>
    <app-pos-fulfillment-selector
      [value]="fulfillment()"
      [consumoBlocked]="false"
      (selectionChange)="onFulfillmentChange($event)"
    ></app-pos-fulfillment-selector>

    @if (fulfillment() === 'consumo') {
      @if (tableId() == null && pickedTableId() == null) {
        <button
          type="button"
          class="open-table-cta"
          (click)="openTablePicker.set(true)"
        >
          <app-icon name="layout-grid" [size]="16"></app-icon>
          <span>Abrir mesa</span>
        </button>
        <div class="fulfillment-hint">
          <app-icon name="info" [size]="14"></app-icon>
          <span>Selecciona una mesa antes de continuar como consumo.</span>
        </div>
      } @else {
        <div class="table-pill">
          <app-icon name="layout-grid" [size]="14"></app-icon>
          <span>Mesa #{{ tableId() ?? pickedTableId() }}</span>
        </div>
      }
    }
  </div>
</div>

<!-- Picker de mesa inline. Reutiliza el mismo PosOpenTableModalComponent del
     flujo crear-orden. -->
<app-pos-open-table-modal
  [isOpen]="openTablePicker()"
  (isOpenChange)="openTablePicker.set($event)"
  [customer]="cartState()?.customer ?? null"
  (sessionOpened)="onTableSessionPicked($event)"
></app-pos-open-table-modal>
