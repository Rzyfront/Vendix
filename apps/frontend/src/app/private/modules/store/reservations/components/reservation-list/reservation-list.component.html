<!-- Reservation List Container - Mobile First -->
<app-card [padding]="false">

  <!-- Search Section: sticky below stats on mobile -->
  <div class="sticky top-[99px] z-10 bg-background px-2 py-1.5 -mt-[5px] md:mt-0 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border">
    <div class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4">
      <!-- Title -->
      <h2 class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary">
        Todas las Reservas ({{ totalItems }})
      </h2>

      <!-- Search + Options -->
      <div class="flex items-center gap-2 w-full md:w-auto">
        <app-inputsearch
          class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
          size="sm"
          placeholder="Buscar reservas..."
          (search)="onSearch($event)"
        ></app-inputsearch>

        <app-button
          variant="outline"
          size="sm"
          customClasses="w-9 h-9 !px-0 bg-surface shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none !rounded-[10px] shrink-0"
          (clicked)="create.emit()"
          title="Nueva Reserva"
        >
          <app-icon slot="icon" name="plus" [size]="18"></app-icon>
        </app-button>

        <app-options-dropdown
          class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
          [filters]="filterConfigs"
          [filterValues]="filterValues"
          [actions]="dropdownActions"
          [isLoading]="loading"
          (filterChange)="onFilterChange($event)"
          (clearAllFilters)="onClearFilters()"
          (actionClick)="onActionClick($event)"
        ></app-options-dropdown>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  @if (loading) {
    <div class="p-4 md:p-6 text-center">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
      <p class="mt-2 text-text-secondary">Cargando reservas...</p>
    </div>
  }

  <!-- Empty State -->
  @if (!loading && bookings.length === 0) {
    <app-empty-state
      icon="calendar"
      [title]="getEmptyStateTitle()"
      [description]="getEmptyStateDescription()"
      actionButtonText="Nueva Reserva"
      [showActionButton]="!hasFilters"
      [showRefreshButton]="true"
      [showClearFilters]="hasFilters"
      (actionClick)="create.emit()"
      (refreshClick)="create.emit()"
      (clearFiltersClick)="onClearFilters()"
    ></app-empty-state>
  }

  <!-- Responsive Data View -->
  @if (!loading && bookings.length > 0) {
    <div class="px-2 pb-2 pt-1 md:p-4">
      <app-responsive-data-view
        [data]="bookings"
        [columns]="columns"
        [cardConfig]="cardConfig"
        [actions]="actions"
        [loading]="loading"
        [hoverable]="true"
        [striped]="true"
        [emptyMessage]="'No se encontraron reservas'"
        [emptyIcon]="'calendar'"
        tableSize="md"
      ></app-responsive-data-view>

      <!-- Pagination -->
      @if (totalItems > 0) {
        <div class="mt-4 border-t border-border pt-4">
          <app-pagination
            [currentPage]="page"
            [total]="totalItems"
            [limit]="limit"
            [totalPages]="totalPages"
            infoStyle="none"
            (pageChange)="onPageChangeAction($event)"
          ></app-pagination>
        </div>
      }
    </div>
  }
</app-card>
