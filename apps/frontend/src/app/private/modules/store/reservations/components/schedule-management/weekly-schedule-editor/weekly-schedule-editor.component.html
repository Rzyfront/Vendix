<div class="schedule-editor">
  <div class="schedule-editor__header">
    <h4>
      <app-icon name="clock" [size]="18"></app-icon>
      Horario Semanal
    </h4>
  </div>

  @if (loading()) {
    <div class="loading-container">
      <app-spinner size="md"></app-spinner>
    </div>
  } @else {
    <div class="schedule-table">
      <!-- Desktop header -->
      <div class="schedule-table__header">
        <div class="col-day">Día</div>
        <div class="col-active">Activo</div>
        <div class="col-time">Hora Inicio</div>
        <div class="col-time">Hora Fin</div>
        <div class="col-duration">Duración Slot</div>
        <div class="col-number">Capacidad</div>
        <div class="col-number">Buffer (min)</div>
      </div>

      @for (row of rows(); track row.day_of_week; let i = $index) {
        <div class="schedule-row" [class.schedule-row--disabled]="!row.is_active">
          <!-- Day label -->
          <div class="col-day">
            <span class="day-label">{{ row.label }}</span>
          </div>

          <!-- Active toggle -->
          <div class="col-active">
            <label class="toggle-checkbox">
              <input
                type="checkbox"
                [checked]="row.is_active"
                (change)="onToggleDay(i)"
              />
              <span class="toggle-checkbox__slider"></span>
            </label>
          </div>

          <!-- Start time -->
          <div class="col-time">
            <label class="mobile-label">Inicio</label>
            <input
              type="time"
              class="field-input"
              [value]="row.start_time"
              [disabled]="!row.is_active"
              (input)="onFieldChange(i, 'start_time', $any($event.target).value)"
            />
          </div>

          <!-- End time -->
          <div class="col-time">
            <label class="mobile-label">Fin</label>
            <input
              type="time"
              class="field-input"
              [value]="row.end_time"
              [disabled]="!row.is_active"
              (input)="onFieldChange(i, 'end_time', $any($event.target).value)"
            />
          </div>

          <!-- Slot duration -->
          <div class="col-duration">
            <label class="mobile-label">Duración</label>
            <select
              class="field-input"
              [value]="row.slot_duration_minutes"
              [disabled]="!row.is_active"
              (change)="onFieldChange(i, 'slot_duration_minutes', +$any($event.target).value)"
            >
              @for (opt of durationOptions; track opt.value) {
                <option [value]="opt.value">{{ opt.label }}</option>
              }
            </select>
          </div>

          <!-- Capacity -->
          <div class="col-number">
            <label class="mobile-label">Capacidad</label>
            <input
              type="number"
              class="field-input"
              [value]="row.capacity"
              [disabled]="!row.is_active"
              min="1"
              (input)="onFieldChange(i, 'capacity', +$any($event.target).value)"
            />
          </div>

          <!-- Buffer -->
          <div class="col-number">
            <label class="mobile-label">Buffer</label>
            <input
              type="number"
              class="field-input"
              [value]="row.buffer_minutes"
              [disabled]="!row.is_active"
              min="0"
              (input)="onFieldChange(i, 'buffer_minutes', +$any($event.target).value)"
            />
          </div>
        </div>
      }
    </div>

    <div class="schedule-editor__actions">
      <app-button
        variant="primary"
        [loading]="saving()"
        (clicked)="saveSchedule()"
      >
        <app-icon name="save" [size]="16"></app-icon>
        Guardar Horario
      </app-button>
    </div>
  }
</div>
