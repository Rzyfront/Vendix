<div class="w-full">
  <!-- Sticky Header -->
  <div class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-[var(--color-border)] shadow-sm rounded-b-xl mb-4 md:mb-6 px-4 py-2.5 md:px-6 md:py-3">
    <div class="flex items-center justify-between gap-3">
      <!-- Left: Title -->
      <div class="flex items-center gap-2.5 min-w-0">
        <div class="hidden md:flex w-10 h-10 rounded-lg bg-[var(--color-background)] items-center justify-center border border-[var(--color-border)] shadow-sm shrink-0">
          <app-icon name="calendar-check" [size]="20" class="text-[var(--color-primary)]"></app-icon>
        </div>
        <div class="min-w-0">
          <h1 class="text-base md:text-lg font-bold text-[var(--color-text-primary)] leading-tight truncate">Reservas</h1>
          <p class="hidden sm:block text-xs text-[var(--color-text-secondary)] font-medium truncate">Gestiona las reservas y citas de tu negocio</p>
        </div>
      </div>

      <!-- Right: View Toggle + New Button -->
      <div class="flex items-center gap-2 md:gap-3 shrink-0">
        <!-- View Toggle -->
        <div class="view-toggle">
          <button
            type="button"
            class="toggle-btn"
            [class.active]="activeView === 'calendar'"
            (click)="activeView = 'calendar'">
            <app-icon name="calendar" [size]="14"></app-icon>
            <span class="hidden sm:inline">Calendario</span>
          </button>
          <button
            type="button"
            class="toggle-btn"
            [class.active]="activeView === 'list'"
            (click)="activeView = 'list'">
            <app-icon name="list" [size]="14"></app-icon>
            <span class="hidden sm:inline">Lista</span>
          </button>
        </div>

        <!-- New Reservation Button -->
        <button
          type="button"
          (click)="onCreateNew()"
          class="flex items-center gap-1.5 px-3 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm shadow-sm active:scale-95 transition-all min-h-[36px]"
          style="background: var(--color-primary); color: var(--color-text-on-primary)">
          <app-icon name="plus" [size]="14"></app-icon>
          <span class="hidden sm:inline">Nueva Reserva</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-container">
    <app-stats
      title="Reservas de Hoy"
      [value]="stats?.today_count || 0"
      smallText="Reservas programadas hoy"
      iconName="calendar"
      iconBgColor="bg-indigo-100"
      iconColor="text-indigo-600"
    ></app-stats>

    <app-stats
      title="Pendientes"
      [value]="stats?.pending_count || 0"
      smallText="Esperando confirmacion"
      iconName="clock"
      iconBgColor="bg-amber-100"
      iconColor="text-amber-600"
    ></app-stats>

    <app-stats
      title="Confirmadas"
      [value]="stats?.confirmed_count || 0"
      smallText="Listas para atender"
      iconName="check-circle"
      iconBgColor="bg-emerald-100"
      iconColor="text-emerald-600"
    ></app-stats>

    <app-stats
      title="Tasa de Cancelacion"
      [value]="formatRate(stats?.cancellation_rate || 0)"
      smallText="Cancelaciones recientes"
      iconName="x-circle"
      iconBgColor="bg-red-100"
      iconColor="text-red-600"
    ></app-stats>
  </div>

  <!-- Main Content Grid -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6">
    <!-- Left: Calendar or List (8 cols) -->
    <div class="lg:col-span-8">
      @if (activeView === 'calendar') {
        <app-card shadow="sm" customClasses="overflow-hidden">
          <app-calendar-container
            [refreshTrigger]="calendarRefreshTrigger"
            (slotClicked)="onSlotClicked($event)"
            (bookingClicked)="onReschedule($event)"
            (bookingDropped)="onBookingDropped($event)"
            (createNew)="onCreateNew()"
          />
          <!-- Calendar Legend -->
          <div class="px-4 py-3 border-t border-[var(--color-border)] flex flex-wrap gap-x-5 gap-y-2">
            <div class="flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-amber-500"></span>
              <span class="text-[11px] text-[var(--color-text-secondary)]">Pendiente</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-blue-500"></span>
              <span class="text-[11px] text-[var(--color-text-secondary)]">Confirmada</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
              <span class="text-[11px] text-[var(--color-text-secondary)]">En progreso</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
              <span class="text-[11px] text-[var(--color-text-secondary)]">Completada</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-red-500"></span>
              <span class="text-[11px] text-[var(--color-text-secondary)]">Cancelada</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-gray-400"></span>
              <span class="text-[11px] text-[var(--color-text-secondary)]">No show</span>
            </div>
          </div>
        </app-card>
      }

      @if (activeView === 'list') {
        <app-reservation-list
          [bookings]="bookings"
          [loading]="loading"
          [totalItems]="totalItems"
          [page]="page"
          [limit]="limit"
          (search)="onSearch($event)"
          (pageChange)="onPageChange($event)"
          (statusFilter)="onStatusFilterChange($event)"
          (create)="onCreateNew()"
          (confirm)="onConfirm($event)"
          (cancel)="onCancel($event)"
          (complete)="onComplete($event)"
          (noShow)="onNoShow($event)"
          (reschedule)="onReschedule($event)"
        ></app-reservation-list>
      }
    </div>

    <!-- Right: Sidebar (4 cols) -->
    <div class="lg:col-span-4 flex flex-col gap-4">
      <app-today-reservations-panel
        [bookings]="todayBookings()"
        [loading]="todayLoading()"
        (bookingClicked)="onReschedule($event)"
        (viewAllClicked)="onViewAllToday()"
      />

      <app-quick-actions-panel
        (walkIn)="onWalkIn()"
        (blockSchedule)="onBlockSchedule()"
        (exportReport)="onExportReport()"
      />
    </div>
  </div>

  <!-- Create Reservation Modal -->
  <app-reservation-form-modal
    [isOpen]="isFormModalOpen"
    (closed)="onFormModalClose()"
    (created)="onReservationCreated()"
  ></app-reservation-form-modal>

  <!-- Tap-to-Book Modal -->
  <app-quick-book-from-slot-modal
    [isOpen]="isTapToBookModalOpen"
    [prefilledDate]="tapToBookDate"
    [prefilledTime]="tapToBookTime"
    (closed)="isTapToBookModalOpen = false"
    (created)="onTapToBookCreated()"
  />

  <!-- Reschedule Modal -->
  <app-reschedule-modal
    [isOpen]="isRescheduleModalOpen"
    [booking]="bookingToReschedule"
    (closed)="isRescheduleModalOpen = false"
    (rescheduled)="onRescheduleCompleted()"
  />
</div>
