<app-card shadow="sm" [responsivePadding]="true">
  <div slot="header" class="flex items-center gap-2 w-full">
    <app-icon name="zap" [size]="16" class="text-[var(--color-text-secondary)]"></app-icon>
    <span class="text-sm font-bold text-[var(--color-text-primary)]">Acciones Rapidas</span>
  </div>

  <div class="space-y-2">
    <!-- Walk-in -->
    <button
      type="button"
      (click)="walkIn.emit()"
      class="w-full min-h-[44px] flex items-center gap-3 px-3 py-2.5 rounded-xl border border-[var(--color-border)] bg-[var(--color-background)] hover:bg-[var(--color-surface-hover)] transition-colors text-left">
      <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center shrink-0">
        <app-icon name="user-plus" [size]="14" class="text-emerald-600"></app-icon>
      </div>
      <div>
        <p class="text-sm font-semibold text-[var(--color-text-primary)]">Registrar walk-in</p>
        <p class="text-xs text-[var(--color-text-secondary)]">Cliente sin reserva previa</p>
      </div>
    </button>

    <!-- Block schedule -->
    <button
      type="button"
      (click)="blockSchedule.emit()"
      class="w-full min-h-[44px] flex items-center gap-3 px-3 py-2.5 rounded-xl border border-[var(--color-border)] bg-[var(--color-background)] hover:bg-[var(--color-surface-hover)] transition-colors text-left">
      <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center shrink-0">
        <app-icon name="lock" [size]="14" class="text-amber-600"></app-icon>
      </div>
      <div>
        <p class="text-sm font-semibold text-[var(--color-text-primary)]">Bloquear horario</p>
        <p class="text-xs text-[var(--color-text-secondary)]">Gestionar excepciones</p>
      </div>
    </button>

    <!-- Export -->
    <button
      type="button"
      (click)="exportReport.emit()"
      class="w-full min-h-[44px] flex items-center gap-3 px-3 py-2.5 rounded-xl border border-[var(--color-border)] bg-[var(--color-background)] hover:bg-[var(--color-surface-hover)] transition-colors text-left">
      <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0">
        <app-icon name="download" [size]="14" class="text-blue-600"></app-icon>
      </div>
      <div>
        <p class="text-sm font-semibold text-[var(--color-text-primary)]">Exportar reporte</p>
        <p class="text-xs text-[var(--color-text-secondary)]">Descargar reservas</p>
      </div>
    </button>
  </div>
</app-card>
