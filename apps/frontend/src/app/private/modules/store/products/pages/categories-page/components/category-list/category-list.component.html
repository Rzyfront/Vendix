<div class="md:space-y-4">
  <!-- Categories List Container -->
  <app-card [responsive]="true" [padding]="false">
    <!-- Search Section: sticky below stats on mobile, normal on desktop -->
    <div
      class="sticky top-[99px] z-10 bg-background px-2 py-1.5 -mt-[5px] md:mt-0 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border"
    >
      <div
        class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4"
      >
        <!-- Title - smaller on mobile, larger on desktop -->
        <h2
          class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary"
        >
          Categorías ({{ totalItems() }})
        </h2>

        <!-- Search row - horizontal on mobile -->
        <div class="flex items-center gap-2 w-full md:w-auto">
          <app-inputsearch
            class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            size="sm"
            placeholder="Buscar categoría..."
            [debounceTime]="300"
            [ngModel]="searchTerm()"
            (ngModelChange)="onSearchChange($event)"
          ></app-inputsearch>

          @if (canCreate()) {
            <app-button
              variant="outline"
              size="md"
              customClasses="w-10 sm:w-11 !px-0 bg-surface shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none !rounded-[10px] shrink-0"
              (clicked)="create.emit()"
              title="Agregar Categoría"
            >
              <app-icon slot="icon" name="plus" [size]="18"></app-icon>
            </app-button>
          }

          <app-options-dropdown
            class="shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
            [filters]="filterConfigs"
            [filterValues]="filterValues"
            [actions]="dropdownActions()"
            [isLoading]="isLoading()"
            (filterChange)="onFilterChange($event)"
            (clearAllFilters)="clearFilters()"
            (actionClick)="onActionClick($event)"
          ></app-options-dropdown>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    @if (isLoading()) {
      <div class="p-4 md:p-6 text-center">
        <div
          class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"
        ></div>
        <p class="mt-2 text-text-secondary">Cargando categorías...</p>
      </div>
    }

    <!-- Empty State -->
    @if (!isLoading() && items().length === 0) {
      <app-empty-state
        icon="layers"
        [title]="getEmptyStateTitle()"
        [description]="getEmptyStateDescription()"
        actionButtonText="Agregar Categoría"
        [showActionButton]="!hasFilters && canCreate()"
        [showRefreshButton]="true"
        [showClearFilters]="hasFilters"
        (actionClick)="create.emit()"
        (refreshClick)="refresh.emit()"
        (clearFiltersClick)="clearFilters()"
      ></app-empty-state>
    }

    <!-- Categories List -->
    @if (!isLoading() && items().length > 0) {
      <div class="px-2 pb-2 pt-3 md:p-4">
        <app-responsive-data-view
          [data]="items()"
          [columns]="tableColumns"
          [cardConfig]="cardConfig"
          [actions]="tableActions()"
          [loading]="isLoading()"
          [sortable]="true"
          emptyMessage="No hay categorías registradas"
          emptyIcon="layers"
          (sort)="sort.emit($event)"
          (rowClick)="onRowClick($event)"
        ></app-responsive-data-view>
        <div class="mt-4 flex justify-center">
          <app-pagination
            [currentPage]="currentPage()"
            [totalPages]="totalPages()"
            [total]="totalItems()"
            [limit]="limit()"
            (pageChange)="pageChange.emit($event)"
          />
        </div>
      </div>
    }
  </app-card>

  <app-image-lightbox
    [isOpen]="imagePreviewOpen()"
    [currentImage]="getSelectedImageUrl()"
    [alt]="getSelectedImageAlt()"
    [title]="getSelectedImageAlt()"
    [showInfo]="true"
    (close)="closeImagePreview()"
  ></app-image-lightbox>
</div>
