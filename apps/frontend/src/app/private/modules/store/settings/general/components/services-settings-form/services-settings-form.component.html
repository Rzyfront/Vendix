<div class="settings-section" [formGroup]="form">
  <div class="settings-section__header">
    <h3 class="settings-section__title">
      <app-icon name="briefcase" [size]="16"></app-icon>
      Servicios
    </h3>
    <p class="settings-section__hint">
      Como tu tienda ofrece servicios, captura la dirección de tu
      local y define si también atiendes a domicilio.
    </p>
  </div>

  <div class="settings-section__body">
    <!-- Toggle: ofrece a domicilio (mismo componente que Notificaciones) -->
    <app-setting-toggle
      [formControl]="offerHomeServiceControl"
      label="¿Ofrece servicio a domicilio?"
      description="Si está activo, el cliente puede elegir entre ir a tu local o que tú vayas a su casa."
      (changed)="onFieldChange()"
    />

    <!-- Dirección del local -->
    <div formGroupName="local_address" class="settings-subsection">
      <h4 class="settings-subsection__title">Dirección del local</h4>

      <label class="settings-field">
        <span class="settings-field__label">Calle y número <span class="req">*</span></span>
        <input
          type="text"
          class="settings-field__input"
          placeholder="Calle 123 #45-67"
          formControlName="address_line1"
        />
      </label>

      <div class="settings-field-grid">
        <label class="settings-field">
          <span class="settings-field__label">Ciudad <span class="req">*</span></span>
          <input
            type="text"
            class="settings-field__input"
            placeholder="Bogotá"
            formControlName="city"
          />
        </label>
        <label class="settings-field">
          <span class="settings-field__label">Departamento</span>
          <input
            type="text"
            class="settings-field__input"
            placeholder="Cundinamarca"
            formControlName="state_province"
          />
        </label>
      </div>

      <div class="settings-field-grid">
        <label class="settings-field">
          <span class="settings-field__label">País <span class="req">*</span></span>
          <input
            type="text"
            class="settings-field__input"
            placeholder="CO"
            maxlength="3"
            formControlName="country_code"
          />
        </label>
        <label class="settings-field">
          <span class="settings-field__label">Código postal</span>
          <input
            type="text"
            class="settings-field__input"
            placeholder="110111"
            formControlName="postal_code"
          />
        </label>
      </div>
    </div>
  </div>
</div>
