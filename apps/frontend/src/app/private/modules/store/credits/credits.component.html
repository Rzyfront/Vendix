<!-- Stats: sticky mobile, static desktop -->
@if (stats()) {
  <div class="stats-container !mb-0 md:!mb-8 sticky top-0 z-20 bg-background md:static md:bg-transparent">
    <app-stats title="Créditos Activos" [value]="stats()!.active_credits" iconName="credit-card" iconBgColor="bg-blue-100" iconColor="text-blue-500"></app-stats>
    <app-stats title="Monto Pendiente" [value]="'$' + stats()!.total_pending" iconName="dollar-sign" iconBgColor="bg-purple-100" iconColor="text-purple-500"></app-stats>
    <app-stats title="Cuotas Vencidas" [value]="stats()!.overdue_installments" iconName="alert-triangle" iconBgColor="bg-red-100" iconColor="text-red-500"></app-stats>
    <app-stats title="Recaudo del Mes" [value]="'$' + stats()!.monthly_collection" iconName="trending-up" iconBgColor="bg-emerald-100" iconColor="text-emerald-500"></app-stats>
  </div>
}

<!-- Card container -->
<div class="md:bg-surface md:rounded-xl md:shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:border md:border-border">
  <!-- Search: sticky below stats on mobile -->
  <div class="sticky top-[99px] z-10 bg-background px-2 py-1.5 -mt-[5px] md:mt-0 md:static md:bg-transparent md:px-6 md:py-4 md:border-b md:border-border">
    <div class="flex flex-col gap-2 md:flex-row md:justify-between md:items-center md:gap-4">
      <h2 class="text-[13px] font-bold text-gray-600 tracking-wide md:text-lg md:font-semibold md:text-text-primary">
        Ventas a Crédito ({{ meta()?.total || credits().length }})
      </h2>
      <div class="flex items-center gap-2 w-full md:w-auto">
        <app-inputsearch
          class="flex-1 md:w-64 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]"
          placeholder="Buscar por crédito # o cliente..."
          [debounceTime]="300"
          (searchChange)="onSearch($event)"
        ></app-inputsearch>
        <app-button variant="outline" size="sm" customClasses="w-9 h-9 !px-0 shadow-[0_2px_8px_rgba(0,0,0,0.07)] md:shadow-none rounded-[10px]" (clicked)="openCreateInPos()" title="Crear venta a crédito desde el POS">
          <app-icon slot="icon" name="plus" [size]="18"></app-icon>
        </app-button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  @if (loading()) {
    <div class="p-4 md:p-6 text-center">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mx-auto"></div>
    </div>
  }

  <!-- Data + Pagination -->
  @if (!loading()) {
    <div class="px-2 pb-2 pt-3 md:p-4">
      <app-responsive-data-view
        [data]="credits()"
        [columns]="columns"
        [cardConfig]="card_config"
        [actions]="actions"
        [loading]="loading()"
        emptyMessage="No hay créditos registrados"
        emptyIcon="credit-card"
        (rowClick)="onRowClick($event)"
      ></app-responsive-data-view>
      @if (meta()?.total_pages && meta()!.total_pages > 1) {
        <app-pagination
          [currentPage]="meta()!.page"
          [totalPages]="meta()!.total_pages"
          (pageChange)="onPageChange($event)"
        ></app-pagination>
      }
    </div>
  }
</div>
