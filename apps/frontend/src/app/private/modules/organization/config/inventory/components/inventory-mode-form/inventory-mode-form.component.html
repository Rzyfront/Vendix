<div class="space-y-8">
  <div>
    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">
      Modo de Inventario
    </h4>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <button
        type="button"
        (click)="selectMode('organizational')"
        [class]="modeCardClasses('organizational')"
        [disabled]="saving()"
      >
        <div class="flex items-start gap-3">
          <div
            class="w-5 h-5 rounded-full border-2 flex-shrink-0 mt-0.5 flex items-center justify-center"
            [class.border-primary]="selectedMode() === 'organizational'"
            [class.border-gray-300]="selectedMode() !== 'organizational'"
          >
            @if (selectedMode() === 'organizational') {
              <div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
            }
          </div>
          <div class="text-left">
            <h5 class="font-semibold text-[var(--color-text-primary)]">
              Organizacional
            </h5>
            <p class="text-sm text-[var(--color-text-secondary)] mt-1">
              El inventario se gestiona de forma centralizada para toda la organización. Las tiendas comparten stock y ubicaciones.
            </p>
          </div>
        </div>
      </button>

      <button
        type="button"
        (click)="selectMode('independent')"
        [class]="modeCardClasses('independent')"
        [disabled]="saving()"
      >
        <div class="flex items-start gap-3">
          <div
            class="w-5 h-5 rounded-full border-2 flex-shrink-0 mt-0.5 flex items-center justify-center"
            [class.border-primary]="selectedMode() === 'independent'"
            [class.border-gray-300]="selectedMode() !== 'independent'"
          >
            @if (selectedMode() === 'independent') {
              <div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
            }
          </div>
          <div class="text-left">
            <h5 class="font-semibold text-[var(--color-text-primary)]">
              Independiente
            </h5>
            <p class="text-sm text-[var(--color-text-secondary)] mt-1">
              Cada tienda gestiona su propio inventario de forma autónoma. No se comparte stock entre tiendas.
            </p>
          </div>
        </div>
      </button>
    </div>
  </div>

  <div>
    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">
      Alertas de Stock Bajo
    </h4>
    <div class="max-w-md">
      <app-selector
        [formControl]="alertScopeControl"
        label="Alcance de alertas"
        [options]="alertScopeOptions"
        (valueChange)="onFieldChange()"
        size="md"
      ></app-selector>
    </div>
  </div>

  <div>
    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">
      Comportamiento sin Stock
    </h4>
    <div class="max-w-md">
      <app-selector
        [formControl]="fallbackControl"
        label="Acción al agotarse"
        [options]="fallbackOptions"
        (valueChange)="onFieldChange()"
        size="md"
      ></app-selector>
    </div>
  </div>
</div>
