<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Vendix — Plataforma de gestión y e-commerce para tu negocio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- SEO -->
    <meta name="description" content="Crea tu tienda online, gestiona inventario, punto de venta, envíos y clientes desde un solo lugar. Potenciado con inteligencia artificial. Comienza gratis." />
    <meta name="keywords" content="ecommerce, tienda online, punto de venta, POS, inventario, gestión de negocio, vendix, plataforma multitenant, inteligencia artificial" />
    <meta name="author" content="Vendix" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://vendix.online/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vendix — Tu negocio, simplificado" />
    <meta property="og:description" content="Plataforma todo-en-uno para gestionar tu negocio: e-commerce, inventario, POS, envíos y más. Potenciado con IA." />
    <meta property="og:image" content="https://vendix.online/vlogo.png" />
    <meta property="og:url" content="https://vendix.online/" />
    <meta property="og:site_name" content="Vendix" />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vendix — Tu negocio, simplificado" />
    <meta name="twitter:description" content="Plataforma todo-en-uno para gestionar tu negocio: e-commerce, inventario, POS, envíos y más." />
    <meta name="twitter:image" content="https://vendix.online/vlogo.png" />
  </head>
  <body>
    <!--
      Prerender Gate: hides prerendered Vendix Landing on non-Vendix domains.
      Runs synchronously before first paint to prevent flash.
    -->
    <style id="vendix-prerender-gate">
      .vendix-prerender-hidden app-root {
        visibility: hidden !important;
        height: 0 !important;
        overflow: hidden !important;
      }
      .vendix-prerender-hidden .vendix-gate-spinner {
        display: flex !important;
      }
      .vendix-gate-spinner {
        display: none;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 99999;
        background: #f8fafc;
      }
      @keyframes vendix-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .vendix-gate-spinner-ring {
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: vendix-spin 0.8s linear infinite;
      }
    </style>
    <script>
      (function() {
        var h = window.location.hostname;
        var isVendix = h === 'vendix.online' || h === 'www.vendix.online' || h === 'localhost';
        if (!isVendix) {
          document.documentElement.classList.add('vendix-prerender-hidden');
        }
      })();
    </script>
    <div class="vendix-gate-spinner">
      <div class="vendix-gate-spinner-ring"></div>
    </div>

    <app-root></app-root>
  </body>
</html>
