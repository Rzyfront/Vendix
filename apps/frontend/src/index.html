<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Vendix — Plataforma de gestión y e-commerce para tu negocio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- PWA / Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2F6F4E" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- iOS / Apple Web App: Safari ignora el manifest (y no lee un Blob URL) para
         la app instalada; estos meta habilitan modo standalone y el nombre correcto.
         apple-mobile-web-app-title se sobreescribe en runtime con el nombre del tenant. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vendix" />

    <!-- SEO -->
    <meta name="description" content="Crea tu tienda online, gestiona inventario, punto de venta, envíos y clientes desde un solo lugar. Potenciado con inteligencia artificial. Comienza gratis." />
    <meta name="keywords" content="ecommerce, tienda online, punto de venta, POS, inventario, gestión de negocio, vendix, plataforma multitenant, inteligencia artificial" />
    <meta name="author" content="Vendix" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://vendix.online/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vendix — Tu negocio, simplificado" />
    <meta property="og:description" content="Plataforma todo-en-uno para gestionar tu negocio: e-commerce, inventario, POS, envíos y más. Potenciado con IA." />
    <meta property="og:image" content="https://vendix.online/vlogo.png" />
    <meta property="og:url" content="https://vendix.online/" />
    <meta property="og:site_name" content="Vendix" />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vendix — Tu negocio, simplificado" />
    <meta name="twitter:description" content="Plataforma todo-en-uno para gestionar tu negocio: e-commerce, inventario, POS, envíos y más." />
    <meta name="twitter:image" content="https://vendix.online/vlogo.png" />
  </head>
  <body>
    <!--
      Prerender Gate: hides the prerendered HTML (Vendix Landing is baked into
      the '/' prerender and served to every wildcard domain) on ALL domains so a
      neutral Vendix splash shows from the first frame until Angular resolves the
      final view. Runs synchronously before first paint to prevent the flash.
      The 'vendix-prerender-hidden' class is removed by removePrerenderGate() in
      AppComponent once the app decides its view — do NOT rename it.
    -->
    <style id="vendix-prerender-gate">
      .vendix-prerender-hidden app-root {
        visibility: hidden !important;
        height: 0 !important;
        overflow: hidden !important;
      }
      .vendix-prerender-hidden .vendix-gate-spinner {
        display: flex !important;
      }
      .vendix-gate-spinner {
        display: none;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 99999;
        background: #f4f4f4;
      }
      .vendix-gate-loader-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 58px;
        height: 58px;
      }
      /* Triple-ring Vendix loader (green tones, visible on light neutral bg) */
      .vendix-gate-loader {
        --v-size: 1.2px;
        width: calc(48 * var(--v-size));
        height: calc(48 * var(--v-size));
        border-radius: 50%;
        display: inline-block;
        position: relative;
        box-sizing: border-box;
        border: calc(3 * var(--v-size)) solid;
        border-color: #108a15 #108a15 transparent transparent;
        animation: vendix-rot 1s linear infinite;
      }
      .vendix-gate-loader::after,
      .vendix-gate-loader::before {
        content: '';
        box-sizing: border-box;
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto;
        border: calc(3 * var(--v-size)) solid;
        border-color: transparent transparent #cbd5e1 #cbd5e1;
        width: calc(40 * var(--v-size));
        height: calc(40 * var(--v-size));
        border-radius: 50%;
        animation: vendix-rot-back 0.5s linear infinite;
        transform-origin: center center;
      }
      .vendix-gate-loader::before {
        width: calc(32 * var(--v-size));
        height: calc(32 * var(--v-size));
        border-color: #2ecc71 #2ecc71 transparent transparent;
        animation: vendix-rot 1.5s linear infinite;
      }
      .vendix-gate-loader-logo {
        position: absolute;
        width: 22px;
        height: 22px;
        object-fit: contain;
        pointer-events: none;
      }
      @keyframes vendix-rot {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes vendix-rot-back {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .vendix-gate-loader,
        .vendix-gate-loader::after,
        .vendix-gate-loader::before {
          animation: none !important;
        }
      }
    </style>
    <script>
      (function() {
        // Universal gate: hide the prerendered HTML on EVERY domain (no hostname
        // allowlist) so no tenant ever sees the Vendix Landing flash.
        document.documentElement.classList.add('vendix-prerender-hidden');
      })();
    </script>
    <div class="vendix-gate-spinner">
      <div class="vendix-gate-loader-wrap">
        <span class="vendix-gate-loader"></span>
        <img class="vendix-gate-loader-logo" src="/vlogomono.png" alt="Vendix" width="22" height="22" />
      </div>
    </div>

    <app-root></app-root>
  </body>
</html>
