name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
      - 'apps/backend/Dockerfile'
      - 'apps/backend/package*.json'
      - 'apps/backend/prisma/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push Docker image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: vendix-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd apps/backend
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Deploy to EC2 instance
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: vendix-backend
        IMAGE_TAG: ${{ github.sha }}
        EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        SSH_KEY: ${{ secrets.VENDIX_SSH_PRIVATE_KEY }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: |
        echo "🚀 Deploying to EC2 instance: $EC2_INSTANCE_ID"

        # Get EC2 instance public IP
        EC2_PUBLIC_IP=$(aws ec2 describe-instances --instance-ids $EC2_INSTANCE_ID --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
        echo "📍 EC2 Public IP: $EC2_PUBLIC_IP"

        # Save SSH key to file
        echo "$SSH_KEY" > /tmp/vendix-key.pem
        chmod 400 /tmp/vendix-key.pem

        # Wait for EC2 instance to be ready
        echo "⏳ Waiting for EC2 instance to be ready..."
        for i in {1..30}; do
          if ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no -i /tmp/vendix-key.pem ec2-user@$EC2_PUBLIC_IP "echo 'EC2 is ready'" 2>/dev/null; then
            echo "✅ EC2 instance is ready!"
            break
          fi
          echo "⏳ Attempt $i/30: EC2 not ready yet, waiting 10 seconds..."
          sleep 10
        done

        # Deploy on EC2
        ssh -o StrictHostKeyChecking=no -i /tmp/vendix-key.pem ec2-user@$EC2_PUBLIC_IP << ENDSSH
          set -e
          echo "🔐 Logging into ECR..."
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region us-east-1
          aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin $ECR_REGISTRY

          echo "💾 Checking disk space before cleanup..."
          df -h /

          echo "🧹 Cleaning up disk space before pull..."
          # Remove all stopped containers
          sudo docker container prune -f
          # Remove all unused images (not just dangling)
          sudo docker image prune -af
          # Remove all unused volumes
          sudo docker volume prune -f
          # Clean build cache
          sudo docker builder prune -af
          # Clean yum cache
          sudo yum clean all || true

          echo "💾 Disk space after cleanup:"
          df -h /

          echo "📦 Pulling latest Docker image..."
          sudo docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "🔑 Fetching secrets from AWS Secrets Manager..."
          DATABASE_URL=\$(aws secretsmanager get-secret-value --secret-id vendix/production/database --query SecretString --output text | python3 -c "import sys, json; print(json.load(sys.stdin)['DATABASE_URL'])")
          JWT_SECRET=\$(aws secretsmanager get-secret-value --secret-id vendix/production/jwt --query SecretString --output text | python3 -c "import sys, json; print(json.load(sys.stdin)['JWT_SECRET'])")
          EMAIL_PASSWORD=\$(aws secretsmanager get-secret-value --secret-id vendix/production/email --query SecretString --output text | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('EMAIL_PASSWORD', ''))")

          # Fetch app configuration secrets
          APP_SECRETS=\$(aws secretsmanager get-secret-value --secret-id vendix/production/app --query SecretString --output text)
          BASE_DOMAIN=\$(echo "\$APP_SECRETS" | python3 -c "import sys, json; print(json.load(sys.stdin).get('BASE_DOMAIN', 'vendix.com'))")
          FRONTEND_URL=\$(echo "\$APP_SECRETS" | python3 -c "import sys, json; print(json.load(sys.stdin).get('FRONTEND_URL', 'https://vendix.com'))")
          PORT=\$(echo "\$APP_SECRETS" | python3 -c "import sys, json; print(json.load(sys.stdin).get('PORT', '3000'))")
          NODE_ENV=\$(echo "\$APP_SECRETS" | python3 -c "import sys, json; print(json.load(sys.stdin).get('NODE_ENV', 'production'))")
          CORS_ORIGIN=\$(echo "\$APP_SECRETS" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('CORS_ORIGIN', ''))")
          ADDITIONAL_CORS_ORIGINS=\$(echo "\$APP_SECRETS" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('ADDITIONAL_CORS_ORIGINS', ''))")

          echo "🔧 Ensuring Redis env vars are in /opt/vendix/.env..."
          sudo grep -q '^REDIS_HOST=' /opt/vendix/.env || echo 'REDIS_HOST=vendix-redis' | sudo tee -a /opt/vendix/.env > /dev/null
          sudo grep -q '^REDIS_PORT=' /opt/vendix/.env || echo 'REDIS_PORT=6379' | sudo tee -a /opt/vendix/.env > /dev/null

          echo "🌐 Ensuring vendix-net network exists..."
          sudo docker network inspect vendix-net >/dev/null 2>&1 || sudo docker network create vendix-net

          echo "🗄️  Ensuring vendix-redis container is running..."
          if ! sudo docker ps --filter name=^/vendix-redis$ --filter status=running -q | grep -q .; then
            sudo docker rm -f vendix-redis 2>/dev/null || true
            sudo docker run -d --name vendix-redis \\
              --network vendix-net \\
              --restart unless-stopped \\
              -v vendix-redis-data:/data \\
              redis:7-alpine redis-server --appendonly yes --save 60 1000
          fi

          echo "🛑 Stopping current container..."
          sudo docker stop vendix-backend || true
          sudo docker rm vendix-backend || true

          echo "🚀 Starting new container..."
          sudo docker run -d \\
            --name vendix-backend \\
            --network vendix-net \\
            --restart unless-stopped \\
            -p 3000:3000 \\
            --env-file /opt/vendix/.env \\
            -e BASE_DOMAIN="\$BASE_DOMAIN" \\
            -e FRONTEND_URL="\$FRONTEND_URL" \\
            -e PORT="\$PORT" \\
            -e NODE_ENV="\$NODE_ENV" \\
            -e CORS_ORIGIN="\$CORS_ORIGIN" \\
            -e ADDITIONAL_CORS_ORIGINS="\$ADDITIONAL_CORS_ORIGINS" \\
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "⏳ Waiting for container to start and run migrations (40s)..."
          sleep 40

          echo "🔍 Checking if container is running..."
          if sudo docker ps --filter "name=vendix-backend" --filter "status=running" -q | grep -q .; then
            echo "✅ Container is running"
          else
            echo "❌ Container is NOT running — checking logs:"
            sudo docker logs vendix-backend --tail 50
            exit 1
          fi

          echo "🌱 Running production seeds in isolated container..."
          sudo docker run --rm \
            --memory=512m \
            --network=host \
            --env-file /opt/vendix/.env \
            -e DATABASE_URL="\$DATABASE_URL" \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            sh -c "npx --yes tsx prisma/seed-production.ts"
          echo "✅ Seeds completed!"

          echo "🧹 Cleaning up old images..."
          sudo docker image prune -f

          echo "✅ Deployment completed!"
        ENDSSH

        echo "🎉 Backend deployment to EC2 completed successfully!"
        echo "🌐 Backend URL: http://$EC2_PUBLIC_IP:3000"