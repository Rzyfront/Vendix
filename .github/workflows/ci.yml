name: CI

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            mobile:
              - 'apps/mobile/**'
            backend:
              - 'apps/backend/**'
              - 'scripts/tz-audit.sh'

  zoneless-audit:
    name: Zoneless Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    # Pass the PR's actual base ref to the audit script so it diffs against
    # the right integration branch (main or dev). Without this, the script
    # would diff against origin/main by default, flagging pre-existing
    # legacy patterns in dev that are not part of this PR.
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `origin/<BASE_REF>` is available locally
          # for the script's `git diff origin/<BASE_REF>...HEAD` call.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # NOTA: `cache:` se omite intencionalmente. Pasar `false` o string
      # vacío rompe el action con 'Caching for false is not supported'.
      # Ver docs/setup-node@v4 — omitir el parámetro es la forma soportada
      # de desactivar npm caching.
      - run: npm ci
      - run: chmod +x scripts/zoneless-audit.sh
      - run: ./scripts/zoneless-audit.sh

  tz-audit:
    name: TZ Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    # Pure grep guard over the checked-out tree (no build/deps needed): fails if
    # any module reintroduces UTC day/month bucketing outside the store-timezone
    # primitive (QUI-487). See scripts/tz-audit.sh + docs/architecture/store-timezone.md.
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/tz-audit.sh
      - run: ./scripts/tz-audit.sh

  mobile-typecheck:
    name: Mobile Typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # NOTA: `cache:` se omite intencionalmente. Pasar `false` o string
      # vacío rompe el action con 'Caching for false is not supported'. Sin
      # este parámetro el action funciona correctamente y desactiva cache
      # por defecto. Ver docs/setup-node@v4.
      - run: npm ci
      - run: npx tsc --noEmit
        working-directory: apps/mobile
