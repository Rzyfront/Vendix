name: CI

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            mobile:
              - 'apps/mobile/**'

  zoneless-audit:
    name: Zoneless Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    # Pass the PR's actual base ref to the audit script so it diffs against
    # the right integration branch (main or dev). Without this, the script
    # would diff against origin/main by default, flagging pre-existing
    # legacy patterns in dev that are not part of this PR.
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `origin/<BASE_REF>` is available locally
          # for the script's `git diff origin/<BASE_REF>...HEAD` call.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: chmod +x scripts/zoneless-audit.sh
      - run: ./scripts/zoneless-audit.sh

  mobile-typecheck:
    name: Mobile Typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
        working-directory: apps/mobile
